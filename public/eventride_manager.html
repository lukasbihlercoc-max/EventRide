<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EventRide Manager</title>
<link rel="icon" type="image/png" href="../assets/icon/app_icon.png" />
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#F0F0EE;color:#1a1a1a;font-size:14px;line-height:1.5}
a{color:#E88C2E;text-decoration:none}

button{font-family:inherit;font-size:13px;cursor:pointer;border:1px solid #ddd;background:#fff;border-radius:7px;padding:6px 13px;transition:background .15s,border-color .15s}
button:hover{background:#f5f5f3;border-color:#ccc}
button.primary{background:#E88C2E;color:#fff;border-color:#E88C2E;font-weight:500}
button.primary:hover{background:#d07a20;border-color:#d07a20}
button.danger{color:#c0392b;border-color:#f0c0bb;background:#fff}
button.danger:hover{background:#fef0ee}
button.small{padding:4px 10px;font-size:12px}
button.icon-btn{border:none;background:none;padding:4px 6px;font-size:16px;line-height:1;border-radius:6px}
button.icon-btn:hover{background:#f0f0ee}

input,select,textarea{font-family:inherit;font-size:13px;border:1px solid #ddd;border-radius:7px;padding:7px 10px;width:100%;background:#fff;color:#1a1a1a;transition:border-color .15s}
input:focus,select:focus,textarea:focus{outline:none;border-color:#E88C2E;box-shadow:0 0 0 3px rgba(232,140,46,.12)}

.card{background:#fff;border:1px solid #e2e2df;border-radius:12px}

.badge{display:inline-flex;align-items:center;font-size:11px;font-weight:600;padding:2px 8px;border-radius:10px;white-space:nowrap;letter-spacing:.1px}
.badge-kirchtag{background:#FAEEDA;color:#633806}
.badge-feuerwehr{background:#EAF3DE;color:#27500A}
.badge-ball{background:#FBEAF0;color:#72243E}
.badge-krampus{background:#EEEDFE;color:#3C3489}
.badge-disco{background:#E6F1FB;color:#0C447C}
.badge-confirmed{background:#EAF3DE;color:#27500A}
.badge-check{background:#FFF3D6;color:#7A4A00}
.badge-inapp{background:#E6F1FB;color:#0C447C}
.badge-geprueft{background:#f0f0ee;color:#555}

/* Login */
.login-wrap{display:flex;align-items:center;justify-content:center;min-height:100vh;background:#0d1420}
.login-box{background:#fff;border-radius:16px;padding:2.5rem 2rem;text-align:center;width:320px;box-shadow:0 8px 32px rgba(0,0,0,.25)}
.login-logo{font-size:28px;font-weight:700;color:#1a1a1a;margin-bottom:6px}
.login-logo span{color:#E88C2E}
.login-sub{font-size:13px;color:#888;margin-bottom:1.5rem}

/* App layout */
.app-wrap{max-width:1440px;margin:0 auto;padding:0 1rem 2rem}
.header{display:flex;align-items:center;justify-content:space-between;padding:.875rem 0;border-bottom:1px solid #e2e2df;margin-bottom:1rem;background:#F0F0EE;position:sticky;top:0;z-index:50}
.header-logo{font-size:18px;font-weight:700}
.header-logo span{color:#E88C2E}

/* Stats */
.stats-row{display:grid;grid-template-columns:repeat(6,1fr);gap:8px;margin-bottom:1rem}
.stat-card{background:#fff;border:1px solid #e2e2df;border-radius:11px;padding:12px 14px;text-align:center}
.stat-num{font-size:26px;font-weight:700;line-height:1.1}
.stat-lbl{font-size:10px;color:#999;margin-top:3px;text-transform:uppercase;letter-spacing:.4px;font-weight:500}

/* Tabs */
.tabs{display:flex;gap:0;border-bottom:2px solid #e2e2df;margin-bottom:1rem}
.tab-btn{padding:9px 18px;font-size:13px;cursor:pointer;border:none;border-bottom:2px solid transparent;margin-bottom:-2px;background:transparent;color:#888;border-radius:0;font-weight:400;transition:color .15s}
.tab-btn.active{color:#E88C2E;border-bottom:2px solid #E88C2E;font-weight:600}
.tab-btn:hover:not(.active){color:#444;background:none}

/* Content grid */
.main-grid{display:grid;grid-template-columns:1fr;gap:12px}
.main-grid.has-detail{grid-template-columns:1fr 400px}

/* Filter area */
.filter-bar{background:#fff;border:1px solid #e2e2df;border-radius:11px;padding:10px 12px;margin-bottom:12px;display:flex;gap:8px;flex-wrap:wrap;align-items:center}
.filter-bar input,.filter-bar select{width:auto;font-size:12px;padding:5px 9px}
.filter-bar input[type=text]{width:160px}
.filter-count{font-size:11px;color:#bbb;margin-left:auto;white-space:nowrap}

/* Event list */
.event-list-wrap{background:#fff;border:1px solid #e2e2df;border-radius:11px;overflow:hidden}
.event-row{display:flex;align-items:center;gap:10px;padding:10px 14px;cursor:pointer;border-bottom:1px solid #f2f2f0;border-left:3px solid transparent;transition:background .1s}
.event-row:last-child{border-bottom:none}
.event-row:hover{background:#fafaf8}
.event-row.selected{background:#FFF8F0;border-left-color:#E88C2E}
.event-row.status-check{border-left-color:#FAC775}
.event-row.status-confirmed{border-left-color:#7BC47A}
.event-row.status-inapp{border-left-color:#3498DB}
.event-row.past{opacity:.45}
.event-name{flex:1;font-size:13px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.event-meta{font-size:11px;color:#999;margin-top:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.event-date{font-size:12px;font-weight:500;white-space:nowrap}
.event-icons{display:flex;gap:4px;justify-content:flex-end;margin-top:2px}
.icon-check{color:#27AE60;font-size:12px;font-weight:700}
.icon-upload{color:#2980B9;font-size:12px}

/* Detail panel */
.detail-panel{background:#fff;border:1px solid #e2e2df;border-radius:12px;position:sticky;top:64px;max-height:calc(100vh - 80px);overflow-y:auto;display:flex;flex-direction:column}
.detail-top{padding:14px 16px;border-bottom:1px solid #f0f0ee}
.detail-name{font-size:16px;font-weight:700;margin-bottom:6px;line-height:1.3}
.detail-badges{display:flex;gap:5px;flex-wrap:wrap}
.detail-body{padding:14px 16px;flex:1}
.detail-section{margin-bottom:14px}
.detail-section-title{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.6px;color:#bbb;margin-bottom:8px}
.field-grid{display:grid;grid-template-columns:80px 1fr;gap:5px 10px;font-size:12px;align-items:start}
.field-lbl{color:#999;padding-top:1px;font-weight:500}
.field-val{color:#1a1a1a;word-break:break-word}
.field-val.mono{font-family:monospace;font-size:11px;color:#666}

.section-div{border-top:1px solid #f0f0ee;margin:14px 0}

/* Warn / info boxes */
.warn-box{background:#FFFBF0;border:1px solid #FAC775;border-radius:9px;padding:12px;margin-bottom:12px}
.warn-box-title{font-size:11px;font-weight:700;color:#7A4A00;margin-bottom:8px;text-transform:uppercase;letter-spacing:.3px}
.info-box{background:#F0F6FF;border:1px solid #BADEFF;border-radius:9px;padding:10px 12px;font-size:12px;color:#1a4a7a;margin-bottom:12px}

/* Checkboxes */
.check-label{display:flex;align-items:center;gap:9px;cursor:pointer;font-size:13px;padding:5px 0}
.check-label input[type=checkbox]{width:16px;height:16px;accent-color:#E88C2E;cursor:pointer;flex-shrink:0}

/* Edit form */
.edit-grid{display:grid;grid-template-columns:80px 1fr;gap:7px 10px;margin-bottom:1rem;align-items:center;font-size:13px}
.edit-label{color:#888;font-size:12px;font-weight:500}

/* Modals */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.4);display:flex;align-items:center;justify-content:center;z-index:200}
.modal{background:#fff;border-radius:14px;padding:1.5rem;width:440px;max-height:92vh;overflow-y:auto;box-shadow:0 8px 40px rgba(0,0,0,.18)}
.modal h3{font-size:16px;font-weight:700;margin-bottom:1rem}
.modal-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:1rem}
.btn-row{display:flex;gap:8px}
.btn-row button{flex:1}

/* Bezirke */
.bez-card{background:#fff;border:1px solid #e2e2df;border-radius:11px;margin-bottom:8px;overflow:hidden}
.bez-header{display:flex;align-items:center;justify-content:space-between;padding:12px 14px;cursor:pointer;transition:background .1s}
.bez-header:hover{background:#fafaf8}
.bez-body{border-top:1px solid #f0f0ee}
.gem-row{display:flex;align-items:center;justify-content:space-between;padding:8px 14px 8px 24px;font-size:12px;border-bottom:1px solid #f5f5f3;cursor:pointer;transition:background .1s}
.gem-row:last-child{border-bottom:none}
.gem-row:hover{background:#fafaf8}
.gem-row.no-events{color:#ccc}
.gem-row.no-events .gem-count{color:#ddd}
.gem-count{font-size:11px;color:#bbb}
.gem-event{padding:7px 14px 7px 36px;font-size:12px;border-bottom:1px solid #f7f7f5;cursor:pointer;display:flex;align-items:center;gap:8px;transition:background .1s}
.gem-event:last-child{border-bottom:none}
.gem-event:hover{background:#fafaf8}

/* Vorschlag / upload */
.url-preview{font-family:monospace;font-size:10px;color:#888;word-break:break-all;background:#f7f7f5;padding:6px 8px;border-radius:7px;margin-bottom:8px;max-height:48px;overflow:hidden}
.tag-new{background:#E6F1FB;color:#0C447C;font-size:10px;padding:1px 6px;border-radius:8px;margin-left:5px}

/* Toast */
#mgr-toast{display:none;position:fixed;bottom:24px;left:50%;transform:translateX(-50%);padding:10px 20px;border-radius:8px;font-size:13px;font-weight:500;color:#fff;z-index:999;box-shadow:0 4px 16px rgba(0,0,0,.2)}

/* Empty state */
.empty-state{text-align:center;padding:3rem 2rem;color:#bbb;font-size:13px}

/* Inapp detail */
.inapp-id{font-family:monospace;font-size:11px;color:#999;background:#f7f7f5;padding:4px 8px;border-radius:6px;display:inline-block;margin-top:4px}

/* CSV import progress */
@keyframes spin{to{transform:rotate(360deg)}}
.csv-spinner{width:18px;height:18px;border:2px solid #e2e2df;border-top-color:#E88C2E;border-radius:50%;animation:spin .7s linear infinite;flex-shrink:0}
.csv-progress{background:#fff;border:1px solid #e2e2df;border-radius:10px;padding:16px 18px;margin-top:12px}
.csv-progress-row{display:flex;align-items:center;gap:10px;font-size:13px;margin-bottom:6px}
.csv-progress-row:last-child{margin-bottom:0}
.csv-stat{display:flex;align-items:center;gap:8px;padding:8px 12px;border-radius:8px;font-size:13px}
.csv-stat.new{background:#EAF3DE;color:#27500A}
.csv-stat.skipped{background:#f5f5f3;color:#666}
.csv-stat.error{background:#fef0ee;color:#c0392b}

/* Duplicate grouping */
.event-row.has-dupes{border-bottom:none}
.dupe-group{border-bottom:1px solid #f2f2f0;border-left:3px solid #FAC775;background:#FDFCF7}
.dupe-row{display:flex;align-items:center;gap:8px;padding:7px 14px 7px 28px;border-bottom:1px solid #f5f4f0;font-size:12px}
.dupe-row:last-child{border-bottom:none}
.dupe-actions{display:flex;gap:5px;flex-shrink:0;margin-left:8px}

@media(max-width:900px){
  .main-grid.has-detail{grid-template-columns:1fr}
  .stats-row{grid-template-columns:repeat(3,1fr)}
  .detail-panel{position:static;max-height:none}
}
</style>
</head>
<body>

<div id="login-screen" class="login-wrap" style="display:none">
  <div class="login-box">
    <div class="login-logo">Event<span>Ride</span></div>
    <div class="login-sub">Manager — Intern</div>
    <div id="login-error" style="display:none;background:#fef0ee;color:#c0392b;border-radius:8px;padding:10px 12px;font-size:12px;margin-bottom:1rem;text-align:left"></div>
    <button class="primary" style="width:100%;padding:11px;font-size:14px" onclick="login()">
      Mit Google anmelden
    </button>
  </div>
</div>

<div id="app" style="display:none">
  <div class="app-wrap">
    <div class="header">
      <div>
        <span class="header-logo">Event<span>Ride</span> <span style="font-weight:400;color:#aaa;font-size:13px">Manager</span></span>

      <div style="display:flex;align-items:center;gap:10px">
        <span id="user-name" style="font-size:12px;color:#999"></span>

      <button class="tab-btn" onclick="switchTab('bezirke')" id="tab-bezirke">Bezirke</button>
      <button class="tab-btn" onclick="switchTab('csv')" id="tab-csv">CSV Import</button>
      <button class="tab-btn" onclick="switchTab('flyer')" id="tab-flyer">Flyer</button>

    <div id="content"></div>
  </div>
</div>

<div id="modal-add" class="modal-overlay" style="display:none" onclick="if(event.target===this)closeAdd()">
  <div class="modal">

      <h3 style="margin:0">Event hinzufügen</h3>

    <div class="btn-row" style="margin-top:1rem">
      <button onclick="closeAdd()">Abbrechen</button>
      <button class="primary" onclick="submitAdd()">Hinzufügen</button>
    </div>
  </div>
</div>

<div id="modal-upload" class="modal-overlay" style="display:none" onclick="if(event.target===this)closeUpload()">
  <div class="modal" style="width:520px;max-width:95vw">
    <div class="modal-header">
      <h3 id="upload-modal-title" style="margin:0">In App hochladen</h3>
      <button class="icon-btn" onclick="closeUpload()">×</button>
    </div>
    <div id="upload-form-content"></div>
    <div class="btn-row" id="upload-btn-row" style="margin-top:1rem">
      <button onclick="closeUpload()">Abbrechen</button>
      <button class="primary" id="btn-upload-submit" onclick="submitUpload()">↑ In App speichern</button>
    </div>
  </div>
</div>

<div id="mgr-toast"></div>

<script>
const CFG = {
  apiKey:"AIzaSyBAq6FHDB3s_mWcE7ZSNifhSiOxUWrxQac",
  authDomain:"eventride-cd0e9.firebaseapp.com",
  projectId:"eventride-cd0e9",
  storageBucket:"eventride-cd0e9.firebasestorage.app",
  messagingSenderId:"686951435694",
  appId:"1:686951435694:web:b7ebb9bded06f1fa7e4c3f"
};
firebase.initializeApp(CFG);
const auth = firebase.auth();
const db = firebase.firestore();

const BEZIRKE = ["Hermagor","Klagenfurt-Land","Klagenfurt-Stadt","Feldkirchen","Sankt Veit","Spittal","Villach-Land","Villach-Stadt","Völkermarkt","Wolfsberg"];
const GEMEINDEN = {
  "Hermagor":["Dellach","Gitschtal","Hermagor-Pressegger See","Kirchbach","Kötschach-Mauthen","Lesachtal","St. Stefan im Gailtal"],
  "Klagenfurt-Land":["Ebenthal in Kärnten","Feistritz im Rosental","Ferlach","Grafenstein","Keutschach am See","Krumpendorf am Wörther See","Maria Rain","Maria Saal","Maria Wörth","Moosburg","Poggersdorf","Pörtschach am Wörther See","Schiefling am Wörthersee","St. Margareten im Rosental","Techelsberg am Wörther See","Zell"],
  "Klagenfurt-Stadt":["Klagenfurt am Wörthersee"],
  "Feldkirchen":["Albeck","Feldkirchen in Kärnten","Glanegg","Gnesau","Himmelberg","Ossiach","Reichenau","St. Urban","Steindorf am Ossiacher See","Steuerberg"],
  "Sankt Veit":["Althofen","Brückl","Deutsch-Griffen","Eberstein","Frauenstein","Friesach","Gurk","Guttaring","Hüttenberg","Kappel am Krappfeld","Klein St. Paul","Metnitz","Micheldorf","Mölbling","St. Georgen am Längsee","St. Veit an der Glan","Strassburg"],
  "Spittal":["Bad Kleinkirchheim","Baldramsdorf","Berg im Drautal","Dellach im Drautal","Ferndorf","Flattach","Fresach","Gmünd in Kärnten","Greifenburg","Großkirchheim","Heiligenblut am Großglockner","Irschen","Kleblach-Lind","Millstatt","Mörtschach","Mühldorf","Oberdrauburg","Obervellach","Radenthein","Rangersdorf","Reißeck","Rennweg am Katschberg","Sachsenburg","Seeboden","Spittal an der Drau","Stall","Steinfeld","Stockenboi","Trebesing","Weißensee","Winklern"],
  "Villach-Land":["Arnoldstein","Arriach","Bad Bleiberg","Feld am See","Feistritz an der Gail","Finkenstein am Faaker See","Hohenthurn","Nötsch im Gailtal","Paternion","Rosegg","St. Jakob im Rosental","Treffen am Ossiacher See","Velden am Wörther See","Weißenstein","Wernberg"],
  "Villach-Stadt":["Villach"],
  "Völkermarkt":["Bleiburg","Diex","Eberndorf","Eisenkappel-Vellach","Feistritz ob Bleiburg","Gallizien","Globasnitz","Griffen","Neuhaus","Ruden","St. Kanzian am Klopeiner See","Sittersdorf","Völkermarkt"],
  "Wolfsberg":["Bad St. Leonhard im Lavanttal","Frantschach-St. Gertraud","Lavamünd","Preitenegg","Reichenfels","St. Andrä","St. Georgen im Lavanttal","St. Paul im Lavanttal","Wolfsberg"]
};
const TYP_CODE = {"Kirchtag":"e1","Feuerwehr":"e2","Disco/Party":"e3","Ball":"e4","Krampus":"e5"};
const TYP_FROM_CODE = {"e1":"Kirchtag","e2":"Feuerwehr","e3":"Disco/Party","e4":"Ball","e5":"Krampus"};
const TYPEN = ["Kirchtag","Feuerwehr","Ball","Krampus","Disco/Party"];

let appEvents = [];
let pending = [];
let curTab = "recherche";
let selId = null;
let editMode = false;
let editData = {};
let expandBez = {};
let expandGem = {};
let fBez = "Alle", fTyp = "Alle", fStatus = "Alle", fSearch = "";
let sortDir = "asc";
let showPast = false;
let addFormData = {};
let uploadData = {};
let uploadPendingId = null;
let flyerEvents = [];
let flyerUploadIndex = 0;
let isFlyerMode = false;

// ---- AUTH ----
const ALLOWED_EMAILS = ['lukas.bihler.coc@gmail.com', 'matzematze666@gmail.com', 'chiara.bihler.cb@gmail.com'];

function showLoginError(msg) {
  const errEl = document.getElementById("login-error");
  if(errEl) { errEl.style.display = "block"; errEl.textContent = msg; }
}

auth.onAuthStateChanged(user => {
  if(user) {
    if(!ALLOWED_EMAILS.includes((user.email||'').toLowerCase().trim())) {
      auth.signOut();
      showLoginError(`Kein Zugriff für ${user.email}. Bitte mit einem berechtigten Account anmelden.`);
      return;
    }
    const errEl = document.getElementById("login-error");
    if(errEl) errEl.style.display = "none";
    document.getElementById("login-screen").style.display = "none";
    document.getElementById("app").style.display = "block";
    document.getElementById("user-name").textContent = user.displayName || user.email;
    initFS();
  } else {
    document.getElementById("login-screen").style.display = "flex";
    document.getElementById("app").style.display = "none";
    appEvents = []; pending = [];
  }
});

// Redirect-Result abfangen (wird nach signInWithRedirect aufgerufen)
auth.getRedirectResult().catch(e => {
  if(e.code !== 'auth/no-auth-event') showLoginError("Fehler beim Anmelden: " + e.message);
});

function login() {
  const provider = new firebase.auth.GoogleAuthProvider();
  auth.signInWithPopup(provider).catch(e => {
    if(e.code === 'auth/popup-blocked' || e.code === 'auth/popup-closed-by-user' || e.code === 'auth/cancelled-popup-request') {
      // Popup geblockt → Redirect-Modus als Fallback
      auth.signInWithRedirect(provider);
    } else {
      showLoginError("Fehler: " + e.message);
    }
  });
}
function logout() { auth.signOut(); }

// ---- FIRESTORE ----
function initFS() {
  db.collection("events").onSnapshot(snap => {
    appEvents = snap.docs.map(d => {
      const data = d.data();
      const typ = TYP_FROM_CODE[data.typ] || data.typ || "";
      return {
        _id: d.id, _src: "app",
        name: data.name || "", datum: data.datum || "", uhrzeit: data.uhrzeit || "",
        gemeinde: data.standort || data.gemeinde || "", bezirk: data.bezirk || "",
        typ, eintritt: data.eintritt != null ? String(data.eintritt) : "k.A.",
        beschreibung: data.beschreibung || "", lat: data.lat, lng: data.lng
      };
    });
    render();
  }, e => { console.warn("events read error", e); });

  db.collection("pending_events").orderBy("createdAt","desc").onSnapshot(snap => {
    pending = snap.docs.map(d => ({_id: d.id, _src: "pending", ...d.data()}));
    render();
  }, e => {
    pending = [];
    render();
  });
}

// ---- DATE UTILS ----
function parseDatum(s) {
  if(!s) return null;
  let m = s.match(/^(\d{2})\.(\d{2})\.(\d{4})$/);
  if(m) return new Date(+m[3], +m[2]-1, +m[1]);
  m = s.match(/^(\d{4})-(\d{2})-(\d{2})$/);
  if(m) return new Date(+m[1], +m[2]-1, +m[3]);
  return null;
}
function fmt(s) {
  const d = parseDatum(s);
  if(!d) return s||"";
  return d.toLocaleDateString("de-AT",{day:"2-digit",month:"2-digit",year:"numeric"});
}
function monthDay(s) {
  const d = parseDatum(s);
  if(!d) return 9999;
  return d.getMonth() * 100 + d.getDate();
}
function getYear(s) { const d=parseDatum(s); return d?d.getFullYear():0; }
function isCheck(ev) { return ev.status==="check" || getYear(ev.datum)<2026; }
function isPast(s) { const d=parseDatum(s); if(!d) return false; const t=new Date();t.setHours(0,0,0,0);return d<t; }

function isMonthDayPast(s, bufferDays=5) {
  const d = parseDatum(s);
  if(!d) return false;
  const today = new Date(); today.setHours(0,0,0,0);
  const thisYear = new Date(today.getFullYear(), d.getMonth(), d.getDate());
  const cutoff = new Date(today); cutoff.setDate(cutoff.getDate() - bufferDays);
  return thisYear < cutoff;
}

function buildAdminUrl(ev) {
  const base = "https://eventride-cd0e9.web.app/index.html";
  const p = new URLSearchParams({
    name: ev.name||"", datum: ev.datum||"",
    uhrzeit: (ev.uhrzeit==="ganztags"?"20:00":ev.uhrzeit)||"20:00",
    standort: ev.gemeinde||"", bezirk: ev.bezirk||"",
    typ: TYP_CODE[ev.typ]||"e1",
    eintritt: ev.eintritt==="kostenlos"?"0":"",
    beschreibung: ev.beschreibung||(ev.name+" in "+ev.gemeinde)
  });
  return base+"?"+p;
}

function typBadge(typ) {
  const map = {Kirchtag:"kirchtag",Feuerwehr:"feuerwehr",Ball:"ball",Krampus:"krampus","Disco/Party":"disco"};
  return `<span class="badge badge-${map[typ]||"kirchtag"}">${typ||"?"}</span>`;
}

function isDupe(name) {
  const n = name.trim().toLowerCase();
  return appEvents.some(e=>e.name.trim().toLowerCase()===n) ||
         pending.some(e=>e.name&&e.name.trim().toLowerCase()===n);
}

// ---- DUPLICATE DETECTION ----
function normalizeName(s) {
  return (s||'').toLowerCase().trim()
    .replace(/\b(20\d\d)\b/g,'')
    .replace(/[-–—\/\\.,!?()]/g,' ')
    .replace(/[^a-zäöüß\s]/g,'')
    .replace(/\s+/g,' ').trim();
}

function levenshtein(a,b) {
  if(!a.length) return b.length;
  if(!b.length) return a.length;
  const m=Array.from({length:b.length+1},(_,i)=>[i]);
  for(let j=0;j<=a.length;j++) m[0][j]=j;
  for(let i=1;i<=b.length;i++)
    for(let j=1;j<=a.length;j++)
      m[i][j]=b[i-1]===a[j-1]?m[i-1][j-1]:1+Math.min(m[i-1][j],m[i][j-1],m[i-1][j-1]);
  return m[b.length][a.length];
}

function isSimilarName(nameA,nameB) {
  const a=normalizeName(nameA), b=normalizeName(nameB);
  if(!a||!b) return false;
  if(a===b) return true;
  if(a.includes(b)||b.includes(a)) return true;
  if(Math.min(a.length,b.length)<8) return false;
  return levenshtein(a,b)/Math.max(a.length,b.length)<0.2;
}

function isSimilarEvent(a,b) {
  if(a._id===b._id) return false;
  if(!a.bezirk||!b.bezirk||a.bezirk!==b.bezirk) return false;
  return isSimilarName(a.name,b.name);
}

// Hard dupe: same normalized name + same bezirk + same date (for CSV auto-skip)
function isHardDupe(name,bezirk,datum,alreadyAdded) {
  const n=normalizeName(name);
  const d=parseDatum(datum);
  if(!d) return false;
  const dKey=`${d.getFullYear()}-${d.getMonth()}-${d.getDate()}`;
  if(alreadyAdded&&alreadyAdded.has(`${n}|${bezirk}|${dKey}`)) return true;
  return [...appEvents,...pending].some(e=>{
    if(normalizeName(e.name)!==n||e.bezirk!==bezirk) return false;
    const ed=parseDatum(e.datum);
    if(!ed) return false;
    return `${ed.getFullYear()}-${ed.getMonth()}-${ed.getDate()}`===dKey;
  });
}

// Group filtered events: primary + suspected dupes below
function buildDupeGroups(evs) {
  const used=new Set();
  const groups=[];
  for(const ev of evs) {
    if(used.has(ev._id)) continue;
    used.add(ev._id);
    if(ev.confirmedUnique) { groups.push({main:ev,dupes:[]}); continue; }
    const dupes=[];
    for(const other of evs) {
      if(used.has(other._id)||other.confirmedUnique) continue;
      if(isSimilarEvent(ev,other)) { dupes.push(other); used.add(other._id); }
    }
    groups.push({main:ev,dupes});
  }
  return groups;
}

function markNotDupe(id) {
  updPending(id,{confirmedUnique:true});
}

// Similar events already in Firebase (for upload warning)
function similarInApp(name,bezirk) {
  return appEvents.filter(e=>isSimilarName(e.name,name)&&(!bezirk||e.bezirk===bezirk));
}

    inApp: appEvents.length,

    pending_check: pending.filter(e=>isCheck(e)).length,

    pending_ready: pending.filter(e=>e.geprueft && !isCheck(e) && !e.inApp).length,

    {l:"In App",v:s.inApp,c:"#0C447C"},

}

// ---- RECHERCHE TAB ----
function getFiltered() {
  let evs = [...pending];
  if(!showPast) evs = evs.filter(e=>!isMonthDayPast(e.datum));
  if(fBez!=="Alle") evs = evs.filter(e=>e.bezirk===fBez);
  if(fTyp!=="Alle") evs = evs.filter(e=>e.typ===fTyp);
  if(fStatus==="confirmed") evs = evs.filter(e=>!isCheck(e));
  else if(fStatus==="check") evs = evs.filter(e=>isCheck(e));
  else if(fStatus==="geprueft") evs = evs.filter(e=>e.geprueft);
  else if(fStatus==="ready") evs = evs.filter(e=>e.geprueft&&!isCheck(e)&&!e.inApp);
  else if(fStatus==="inApp") evs = evs.filter(e=>e.inApp);
  if(fSearch) { const q=fSearch.toLowerCase(); evs=evs.filter(e=>(e.name||"").toLowerCase().includes(q)||(e.gemeinde||"").toLowerCase().includes(q)); }
  evs.sort((a,b)=>{
    const ma=monthDay(a.datum), mb=monthDay(b.datum);
    return sortDir==="asc"?(ma-mb):(mb-ma);
  });
  return evs;
}

function eventRow(ev, hasDupes=false) {
  const check = isCheck(ev);
  const past = isPast(ev.datum);
  const isSel = selId===ev._id;
  const inApp = ev.inApp || appEvents.some(a=>a.name.trim().toLowerCase()===ev.name.trim().toLowerCase());
  const similarApp = !inApp && similarInApp(ev.name, ev.bezirk).length > 0;
  let statusClass = check ? "status-check" : (inApp ? "status-inapp" : "status-confirmed");

  const icons = [];
  if(ev.geprueft) icons.push(`<span class="icon-check" title="Manuell geprüft">✓</span>`);
  if(inApp) icons.push(`<span class="icon-upload" title="In App">↑</span>`);
  if(similarApp) icons.push(`<span style="font-size:10px;background:#E6F1FB;color:#0C447C;padding:1px 6px;border-radius:8px;font-weight:600" title="Ähnliches Event möglicherweise bereits in App">~App</span>`);
  if(hasDupes) icons.push(`<span style="font-size:10px;background:#FFF3D6;color:#7A4A00;padding:1px 6px;border-radius:8px;font-weight:600">ähnlich</span>`);

  return `<div class="event-row ${statusClass} ${isSel?"selected":""} ${past&&!inApp?"past":""} ${hasDupes?"has-dupes":""}" onclick="selectEv('${ev._id}')">
    ${typBadge(ev.typ)}
    <div style="flex:1;min-width:0">
      <div class="event-name" style="color:${check?"#7A4A00":"#1a1a1a"}">${check?"⚠ ":""}${esc(ev.name)}</div>
      <div class="event-meta">${esc(ev.gemeinde)}${ev.bezirk?" · "+esc(ev.bezirk):""}</div>
    </div>
    <div style="text-align:right;flex-shrink:0">
      <div class="event-date" style="color:${past?"#e74c3c":"#555"}">${fmt(ev.datum)}</div>
      <div class="event-icons">${icons.join("")}</div>
    </div>
  </div>`;
}

function renderGroup(g) {
  let html = eventRow(g.main, g.dupes.length>0);
  if(g.dupes.length>0) {
    html += `<div class="dupe-group">`;
    for(const d of g.dupes) html += dupeRow(d);
    html += `</div>`;
  }
  return html;
}

function dupeRow(ev) {
  const check = isCheck(ev);
  const d = parseDatum(ev.datum);
  return `<div class="dupe-row">
    <span style="color:#FAC775;font-size:11px;flex-shrink:0">↳</span>
    ${typBadge(ev.typ)}
    <div style="flex:1;min-width:0">
      <span style="font-weight:500;color:${check?"#7A4A00":"#333"}">${esc(ev.name)}</span>
      <span style="color:#bbb;margin-left:6px">${esc(ev.gemeinde)} · ${fmt(ev.datum)}</span>
    </div>
    <div class="dupe-actions">
      <button class="small danger" onclick="event.stopPropagation();delPending('${ev._id}')">Löschen</button>
      <button class="small" onclick="event.stopPropagation();markNotDupe('${ev._id}')" title="Als eigenständiges Event markieren">Kein Duplikat</button>
    </div>
  </div>`;
}

function selectEv(id) {
  selId = selId===id?null:id;

function startEdit(id) {
  const ev = pending.find(e=>e._id===id);
  if(!ev) return;
  editData = {...ev};
  editMode = true;
  render();
}

function cancelEdit() { editMode=false; render(); }

function saveEdit(id) {
  if(!editData.name||!editData.datum){alert("Name und Datum sind Pflicht.");return;}
  const yr = getYear(editData.datum);
  const patch = {...editData};
  if(yr>=2026) patch.status="confirmed";
  db.collection("pending_events").doc(id).update(patch).catch(e=>alert("Fehler: "+e.message));
  editMode=false;
}

// ---- PENDING CRUD ----
function updPending(id, patch) {
  db.collection("pending_events").doc(id).update(patch).catch(e=>console.error(e));
}

function delPending(id) {
  if(!confirm("Event löschen?")) return;
  db.collection("pending_events").doc(id).delete();
  selId=null; render();
}

function confirm2026(id) {
  const d = document.getElementById("inp-datum-"+id);
  if(!d||!d.value){alert("Bitte Datum eingeben.");return;}
  updPending(id,{datum:d.value,status:"confirmed"});
}

function submitAdd() {
  if(!addFormData.name||!addFormData.datum){alert("Name und Datum Pflicht.");return;}
  if(isDupe(addFormData.name)){
    if(!confirm(`"${addFormData.name}" scheint bereits zu existieren. Trotzdem hinzufügen?`)) return;
  }
  const yr = getYear(addFormData.datum);
  db.collection("pending_events").add({
    ...addFormData, status:yr>=2026?"confirmed":"check",

function splitCSVLine(line, sep) {
  const res = []; let cur = ''; let inQ = false;
  for(let i=0;i<line.length;i++){
    const ch=line[i];
    if(ch==='"'){if(inQ&&line[i+1]==='"'){cur+='"';i++;}else inQ=!inQ;}
    else if(ch===sep&&!inQ){res.push(cur.trim());cur='';}
    else cur+=ch;
  }
  res.push(cur.trim());
  return res;
}

function setCsvProgress(html) {
  const el = document.getElementById("csv-progress");
  if(!el) return;
  el.style.display = html ? "block" : "none";

function importCSV() {
  const text = document.getElementById("csv-input").value.trim();
  const lines = text.split("\n").filter(l=>l.trim());
  if(lines.length<2){setCsvMsg("Mind. Header + 1 Zeile nötig.","red");return;}

  const sep = lines[0].includes(";") ? ";" : ",";
  const hdrs = splitCSVLine(lines[0], sep).map(h=>h.toLowerCase());
  const idx = k => hdrs.findIndex(h=>h.includes(k));
  const iN=idx("name"),iD=idx("datum"),iU=idx("uhrzeit"),iG=idx("gemeinde"),iB=idx("bezirk"),iA=idx("adresse"),iV=idx("veranstalter"),iE=idx("eintritt"),iT=idx("typ"),iQ=idx("quelle");
  if(iN<0||iD<0){setCsvMsg("Spalten 'Eventname' und 'Datum' fehlen.","red");return;}

  const total = lines.length - 1;
  const btn = document.getElementById("csv-import-btn");
  if(btn) btn.disabled = true;

  // Phase 1: Ladescreen zeigen, dann Analyse nach kurzem Yield
  setCsvProgress(`
    <div class="csv-progress">
      <div class="csv-progress-row">
        <div class="csv-spinner"></div>
        <span style="font-weight:500">Analysiere ${total} Events auf Duplikate…</span>
      </div>
      <div style="font-size:12px;color:#aaa;margin-top:4px">Prüfe gegen bestehende Recherche-Liste und Firebase…</div>
    </div>`);

  setTimeout(() => {
    // Phase 2: Dupe-Check + Batch aufbauen
    let added=0, dupes=0, batch=db.batch();
    const addedKeys=new Set();
    for(let i=1;i<lines.length;i++){
      const c = splitCSVLine(lines[i], sep);
      const name = c[iN]||"";
      if(!name) continue;
      const datRaw = c[iD]||"";
      const bezRaw = iB>=0?c[iB]||"":"";
      if(isHardDupe(name,bezRaw,datRaw,addedKeys)){dupes++;continue;}
      const d=parseDatum(datRaw);
      if(d) addedKeys.add(`${normalizeName(name)}|${bezRaw}|${d.getFullYear()}-${d.getMonth()}-${d.getDate()}`);
      const typRaw = (iT>=0?c[iT]||"":"").trim().split(" ")[0]||"Kirchtag";
      const yr = getYear(datRaw);
      const ref = db.collection("pending_events").doc();
      batch.set(ref, {
        name, datum:datRaw, uhrzeit:iU>=0?c[iU]:"20:00",
        gemeinde:iG>=0?c[iG]:"", bezirk:bezRaw,
        adresse:iA>=0?(c[iA]||""):"",
        veranstalter:iV>=0?c[iV]:"örtlich", eintritt:iE>=0?c[iE]:"k.A.",
        typ:typRaw, quelle:iQ>=0?c[iQ]:"", quelle2:"",
        status:yr>=2026?"confirmed":"check", geprueft:false, inApp:false,
        createdAt:firebase.firestore.FieldValue.serverTimestamp()
      });
      added++;
    }

    if(added===0){
      setCsvProgress(`
        <div class="csv-progress">
          <div class="csv-progress-row" style="margin-bottom:10px">
            <span style="font-size:15px">⊘</span>
            <span style="font-weight:600">Keine neuen Events gefunden</span>
          </div>
          <div class="csv-stat skipped">
            <span style="font-size:15px">⊘</span>
            <span><strong>${dupes}</strong> von ${total} Events bereits vorhanden und übersprungen</span>
          </div>
        </div>`);
      if(btn) btn.disabled = false;
      return;
    }

    // Phase 3: Batch speichern
    setCsvProgress(`
      <div class="csv-progress">
        <div class="csv-progress-row" style="margin-bottom:10px">
          <div class="csv-spinner"></div>
          <span style="font-weight:500">Speichert ${added} Events in Firestore…</span>
        </div>
        <div style="display:flex;gap:8px;flex-wrap:wrap">
          <div class="csv-stat new">
            <span style="font-size:15px">✓</span>
            <span><strong>${added}</strong> neu</span>
          </div>
          ${dupes?`<div class="csv-stat skipped">
            <span style="font-size:15px">⊘</span>
            <span><strong>${dupes}</strong> übersprungen (bereits vorhanden)</span>
          </div>`:""}
        </div>
      </div>`);

    batch.commit().then(() => {
      document.getElementById("csv-input").value = "";
      setCsvProgress(`
        <div class="csv-progress">
          <div class="csv-progress-row" style="margin-bottom:10px">
            <span style="font-size:18px">✅</span>
            <span style="font-weight:700;font-size:14px">Import abgeschlossen</span>
          </div>
          <div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:10px">
            <div class="csv-stat new">
              <span style="font-size:15px">✓</span>
              <span><strong>${added}</strong> neue Events importiert</span>
            </div>
            ${dupes?`<div class="csv-stat skipped">
              <span style="font-size:15px">⊘</span>
              <span><strong>${dupes}</strong> übersprungen — Name + Bezirk + Datum bereits vorhanden</span>
            </div>`:""}
          </div>
          <div style="font-size:12px;color:#aaa">Weiterleitung zur Recherche-Liste…</div>
        </div>`);
      setTimeout(() => { setCsvProgress(""); switchTab("recherche"); }, 2000);
    }).catch(e => {
      setCsvProgress(`
        <div class="csv-progress">
          <div class="csv-stat error">
            <span>✕ Fehler beim Speichern: ${esc(e.message)}</span>
          </div>
        </div>`);
      if(btn) btn.disabled = false;
    });
  }, 40);
}

// ---- FLYER IMPORT ----
function importFlyerCSV() {
  const text = (document.getElementById("flyer-csv-input").value || "").trim();
  const lines = text.split("\n").filter(l => l.trim());
  if (lines.length < 2) { showToast("Mind. Header + 1 Zeile nötig.", false); return; }

  const sep = lines[0].includes(";") ? ";" : ",";
  const hdrs = splitCSVLine(lines[0], sep).map(h => h.toLowerCase());
  const idx = k => hdrs.findIndex(h => h.includes(k));
  const iN=idx("name"),iD=idx("datum"),iU=idx("uhrzeit"),iG=idx("gemeinde"),
        iB=idx("bezirk"),iA=idx("adresse"),iV=idx("veranstalter"),iE=idx("eintritt"),iT=idx("typ"),iQ=idx("quelle");
  if (iN < 0 || iD < 0) { showToast("Spalten 'Eventname' und 'Datum' fehlen.", false); return; }

  let imported = 0, dupes = 0;
  const addedKeys = new Set();

  for (let i = 1; i < lines.length; i++) {
    const c = splitCSVLine(lines[i], sep);
    const name = (c[iN] || "").trim();
    if (!name) continue;
    const datRaw = c[iD] || "";
    const bezRaw = iB >= 0 ? (c[iB] || "").trim() : "";

    if (isHardDupe(name, bezRaw, datRaw, addedKeys)) { dupes++; continue; }
    const d = parseDatum(datRaw);
    if (d) {
      const dKey = `${d.getFullYear()}-${d.getMonth()}-${d.getDate()}`;
      const inFlyer = flyerEvents.some(fe => {
        const fd = parseDatum(fe.datum);
        if (!fd) return false;
        return normalizeName(fe.name) === normalizeName(name) && fe.bezirk === bezRaw &&
          `${fd.getFullYear()}-${fd.getMonth()}-${fd.getDate()}` === dKey;
      });
      if (inFlyer) { dupes++; continue; }
      addedKeys.add(`${normalizeName(name)}|${bezRaw}|${dKey}`);
    }

    const typRaw = (iT >= 0 ? c[iT] || "" : "").trim().split(" ")[0] || "Kirchtag";
    flyerEvents.push({
      name, datum: datRaw,
      uhrzeit: (iU >= 0 ? c[iU] || "" : "").trim() || "20:00",
      gemeinde: iG >= 0 ? (c[iG] || "").trim() : "",
      bezirk: bezRaw,
      adresse: iA >= 0 ? (c[iA] || "").trim() : "",
      veranstalter: iV >= 0 ? (c[iV] || "").trim() : "örtlich",
      eintritt: iE >= 0 ? (c[iE] || "").trim() : "k.A.",
      typ: typRaw,
      quelle: iQ >= 0 ? (c[iQ] || "").trim() : "",
      status: "offen"
    });
    imported++;
  }

  flyerEvents.sort((a, b) => {
    const da = parseDatum(a.datum), db2 = parseDatum(b.datum);
    if (!da && !db2) return 0; if (!da) return 1; if (!db2) return -1;
    return da - db2;
  });

  const el = document.getElementById("flyer-csv-input");
  if (el) el.value = "";

  if (imported === 0) {
    showToast(`Keine neuen Events – ${dupes} Duplikat${dupes !== 1 ? "e" : ""} übersprungen`, false);
  } else {
    showToast(`✓ ${imported} importiert${dupes ? " · " + dupes + " übersprungen" : ""}`);
  }
  updateFlyerList();
}

  const hochgeladen = flyerEvents.filter(e => e.status === "hochgeladen").length;
  const uebersprungen = flyerEvents.filter(e => e.status === "übersprungen").length;

  const rows = flyerEvents.map((ev, i) => {
    const past = isPast(ev.datum);
    const statusColor = ev.status === "hochgeladen" ? "#27AE60" : ev.status === "übersprungen" ? "#bbb" : "#E88C2E";
    return `<div class="event-row" style="opacity:${ev.status !== "offen" ? "0.55" : "1"}">

      </div>

        ${ev.status === "offen" ? `<button class="small primary" onclick="openFlyerUpload(${i})">↑</button>` : ""}
      </div>

  }).join("");

  return `<div class="card" style="padding:1.5rem">

      <div>
        <span style="font-size:15px;font-weight:700">Importierte Events</span>
        <span style="font-size:12px;color:#aaa;margin-left:10px">
          ${offen > 0 ? `<span style="color:#E88C2E;font-weight:600">${offen} offen</span>` : ""}
          ${hochgeladen > 0 ? `${offen > 0 ? " · " : ""}<span style="color:#27AE60;font-weight:600">${hochgeladen} hochgeladen</span>` : ""}
          ${uebersprungen > 0 ? ` · <span style="color:#bbb">${uebersprungen} übersprungen</span>` : ""}
        </span>
      </div>
      <div style="display:flex;gap:8px">
        ${offen > 0 ? `<button class="primary" onclick="openFlyerUploadFlow()">↑ Alle hochladen (${offen})</button>` : ""}
        <button class="small danger" onclick="if(confirm('Alle Flyer-Events löschen?')){flyerEvents=[];updateFlyerList();}">Leeren</button>
      </div>
    </div>
    <div class="event-list-wrap">${rows}</div>
  </div>`;
}

  if (curTab === "flyer") {

function openFlyerUploadFlow() {
  const firstIdx = flyerEvents.findIndex(e => e.status === "offen");
  if (firstIdx >= 0) openFlyerUpload(firstIdx);
}

function openFlyerUpload(index) {
  flyerUploadIndex = index;
  isFlyerMode = true;
  const ev = flyerEvents[index];
  if (!ev) return;

  const d = parseDatum(ev.datum);
  const datumISO = d
    ? `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`
    : '';
  const uhr = ev.uhrzeit === 'ganztags' ? '20:00' : (ev.uhrzeit || '20:00');
  uploadData = {
    name: ev.name || '', datum: datumISO, uhrzeit: uhr,
    standort: ev.gemeinde || '', adresse: ev.adresse || '',
    bezirk: ev.bezirk || '', typ: TYP_CODE[ev.typ] || 'e1',
    eintritt: (ev.eintritt === 'k.A.' ? '' : ev.eintritt) || '',
    beschreibung: '', lat: null, lng: null,
  };

  const allOffen = flyerEvents.filter(e => e.status === "offen");
  const pos = allOffen.indexOf(ev) + 1;
  document.getElementById('upload-modal-title').textContent =
    `Flyer hochladen (${pos} von ${allOffen.length})`;

  document.getElementById('upload-form-content').innerHTML = uploadFormHTML();
  document.getElementById('up-eintritt').value = uploadData.eintritt;
  document.getElementById('up-beschreibung').value = uploadData.beschreibung;

  document.getElementById('upload-btn-row').innerHTML =
    '<button onclick="closeUpload()">Schließen</button>' +
    '<button onclick="skipFlyerEvent()">→ Überspringen</button>' +
    '<button class="primary" id="btn-upload-submit" onclick="submitFlyerUpload()">↑ In App speichern</button>';

  document.getElementById('modal-upload').style.display = 'flex';
  if (window.google && window.google.maps && window.google.maps.places) initUploadAutocomplete();
}

function skipFlyerEvent() {
  flyerEvents[flyerUploadIndex].status = "übersprungen";
  updateFlyerList();
  const nextIdx = flyerEvents.findIndex((e, i) => i > flyerUploadIndex && e.status === "offen");
  if (nextIdx >= 0) { openFlyerUpload(nextIdx); return; }
  const anyOffen = flyerEvents.findIndex(e => e.status === "offen");
  if (anyOffen >= 0) { openFlyerUpload(anyOffen); return; }
  showFlyerCompletion();
}

function submitFlyerUpload() {
  if (!uploadData.name || !uploadData.standort) { alert('Name und Standort sind Pflichtfelder.'); return; }
  if (!uploadData.datum) { alert('Bitte ein Datum eingeben.'); return; }
  const uhr = uploadData.uhrzeit || '20:00';
  const datumISO = `${uploadData.datum}T${uhr}:00.000Z`;
  const btn = document.getElementById('btn-upload-submit');
  btn.disabled = true; btn.textContent = '⏳ Speichert…';
  const eintrittText = uploadData.eintritt.trim();
  const beschreibungText = uploadData.beschreibung.trim();
  const combinedBeschreibung = eintrittText && beschreibungText
    ? eintrittText + '\n\n' + beschreibungText : eintrittText || beschreibungText;

  db.collection('events').add({
    name: uploadData.name, datum: datumISO, uhrzeit: uhr,
    standort: uploadData.standort, gemeinde: uploadData.standort,
    adresse: uploadData.adresse || '', bezirk: uploadData.bezirk || '',
    beschreibung: combinedBeschreibung, eintritt: uploadData.eintritt || '',
    typ: uploadData.typ || 'e1', lat: uploadData.lat || null, lng: uploadData.lng || null,
    id: Date.now().toString(), createdAt: firebase.firestore.FieldValue.serverTimestamp(),
  }).then(() => {
    flyerEvents[flyerUploadIndex].status = "hochgeladen";
    updateFlyerList();
    showToast('✓ ' + uploadData.name + ' in App gespeichert');
    const nextIdx = flyerEvents.findIndex((e, i) => i > flyerUploadIndex && e.status === "offen");
    if (nextIdx >= 0) { openFlyerUpload(nextIdx); return; }
    const anyOffen = flyerEvents.findIndex(e => e.status === "offen");
    if (anyOffen >= 0) { openFlyerUpload(anyOffen); return; }
    showFlyerCompletion();
  }).catch(e => {
    btn.disabled = false; btn.textContent = '↑ In App speichern';
    alert('Fehler: ' + e.message);
  });
}

function showFlyerCompletion() {
  const hochgeladen = flyerEvents.filter(e => e.status === "hochgeladen").length;
  const uebersprungen = flyerEvents.filter(e => e.status === "übersprungen").length;
  document.getElementById('upload-modal-title').textContent = 'Flyer-Import abgeschlossen';
  document.getElementById('upload-form-content').innerHTML = `
    <div style="text-align:center;padding:2rem 1rem">
      <div style="font-size:40px;margin-bottom:1rem">✅</div>
      <div style="font-size:16px;font-weight:700;margin-bottom:10px">Alle Events verarbeitet</div>
      <div style="font-size:13px;color:#888;line-height:2">
        ${hochgeladen > 0 ? `<span style="color:#27AE60;font-weight:600">${hochgeladen} hochgeladen</span>` : ""}
        ${uebersprungen > 0 ? `${hochgeladen > 0 ? " · " : ""}<span style="color:#bbb">${uebersprungen} übersprungen</span>` : ""}
      </div>
    </div>`;
  document.getElementById('upload-btn-row').innerHTML =
    '<button class="primary" style="flex:1" onclick="closeUpload()">Schließen</button>';
}

// ---- UPLOAD MODAL ----
function openUpload(id) {
  isFlyerMode = false;
  const ev = pending.find(e => e._id === id);
  if (!ev) return;
  uploadPendingId = id;
  const d = parseDatum(ev.datum);
  const datumISO = d
    ? `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`
    : '';
  const uhr = ev.uhrzeit === 'ganztags' ? '20:00' : (ev.uhrzeit || '20:00');
  uploadData = {
    name: ev.name || '',
    datum: datumISO,
    uhrzeit: uhr,
    standort: ev.gemeinde || '',
    adresse: ev.adresse || '',
    bezirk: ev.bezirk || '',
    typ: TYP_CODE[ev.typ] || 'e1',
    eintritt: (ev.eintritt === 'k.A.' ? '' : ev.eintritt) || '',
    beschreibung: ev.beschreibung || '',
    lat: null,
    lng: null,
  };
  document.getElementById('upload-form-content').innerHTML = uploadFormHTML();
  document.getElementById('up-eintritt').value = uploadData.eintritt;
  document.getElementById('up-beschreibung').value = uploadData.beschreibung;
  document.getElementById('modal-upload').style.display = 'flex';
  if (window.google && window.google.maps && window.google.maps.places) initUploadAutocomplete();
}

function closeUpload() {
  document.getElementById('modal-upload').style.display = 'none';
  isFlyerMode = false;
  document.getElementById('upload-modal-title').textContent = 'In App hochladen';
  document.getElementById('upload-btn-row').innerHTML =
    '<button onclick="closeUpload()">Abbrechen</button>' +
    '<button class="primary" id="btn-upload-submit" onclick="submitUpload()">↑ In App speichern</button>';
}

function uploadFormHTML() {
  const bezOpts = BEZIRKE.map(b => `<option value="${b}" ${uploadData.bezirk===b?'selected':''}>${b}</option>`).join('');
  const typOpts = [['e1','Kirchtag'],['e2','Feuerwehr'],['e3','Disco/Party'],['e4','Ball'],['e5','Krampus']]
    .map(([v,l]) => `<option value="${v}" ${uploadData.typ===v?'selected':''}>${l}</option>`).join('');
  const similar = similarInApp(uploadData.name, uploadData.bezirk);
  const warnHtml = similar.length > 0 ? `
    <div class="warn-box" style="margin-bottom:14px">
      <div class="warn-box-title">⚠ Möglicherweise bereits in App (${similar.length})</div>
      ${similar.map(e=>`<div style="display:flex;align-items:center;gap:6px;padding:4px 0;border-bottom:1px solid #f5e8c8;font-size:12px">
        ${typBadge(e.typ)}
        <span style="flex:1;font-weight:500">${esc(e.name)}</span>
        <span style="color:#888">${esc(e.gemeinde)}</span>
        <span style="color:#888;margin-left:8px">${fmt(e.datum)}</span>
      </div>`).join('')}
      <div style="font-size:11px;color:#7A4A00;margin-top:6px">Bitte prüfen ob es sich um das gleiche Event handelt, bevor du hochlädst.</div>
    </div>` : '';
  return warnHtml + `<div class="edit-grid">
    <span class="edit-label">Name *</span>
    <input id="up-name" value="${esc(uploadData.name)}" oninput="uploadData.name=this.value">
    <span class="edit-label">Datum *</span>
    <input id="up-datum" type="date" value="${uploadData.datum}" onchange="uploadData.datum=this.value">
    <span class="edit-label">Uhrzeit</span>
    <input id="up-uhrzeit" type="time" value="${uploadData.uhrzeit}" onchange="uploadData.uhrzeit=this.value">
    <span class="edit-label">Standort *</span>
    <input id="up-standort" value="${esc(uploadData.standort)}" oninput="uploadData.standort=this.value">
    <span class="edit-label">Adresse</span>
    <div>
      <input id="up-adresse" value="${esc(uploadData.adresse)}" placeholder="Adresse eingeben (Maps-Vorschläge)" oninput="uploadData.adresse=this.value;document.getElementById('up-no-coords-warn').style.display=this.value?'block':'none'">
      <div id="up-coords" style="font-size:11px;color:#27AE60;margin-top:3px;display:none">📍 <span id="up-coords-text"></span></div>
      <div id="up-no-coords-warn" style="font-size:11px;color:#7A4A00;background:#FFFBF0;border:1px solid #FAC775;border-radius:6px;padding:5px 8px;margin-top:4px;display:${uploadData.adresse?'block':'none'}">⚠ Einen Vorschlag aus der Liste auswählen – erst dann werden Koordinaten gesetzt</div>
    </div>
    <span class="edit-label" style="color:#bbb;font-size:11px">oder Koord.</span>
    <div>
      <input id="up-coords-paste" placeholder="46.7513, 14.0364 — aus Google Maps einfügen" style="font-size:12px" oninput="parseCoordsInput(this.value)">
    </div>
    <span class="edit-label">Bezirk</span>
    <select id="up-bezirk" onchange="uploadData.bezirk=this.value"><option value="">–</option>${bezOpts}</select>
    <span class="edit-label">Typ</span>
    <select id="up-typ" onchange="uploadData.typ=this.value">${typOpts}</select>
    <span class="edit-label">Eintritt</span>
    <textarea id="up-eintritt" rows="2" placeholder="z.B. VVK: 15 €&#10;AK: 18 €" oninput="uploadData.eintritt=this.value" style="font-size:12px;padding:7px 10px"></textarea>
    <span class="edit-label">Beschreibung</span>
    <textarea id="up-beschreibung" rows="2" oninput="uploadData.beschreibung=this.value" style="font-size:12px;padding:7px 10px"></textarea>
  </div>`;
}

function initUploadAutocomplete() {
  const input = document.getElementById('up-adresse');
  if (!input) return;
  const ac = new google.maps.places.Autocomplete(input, {
    componentRestrictions: { country: 'at' },
    fields: ['formatted_address', 'geometry'],
  });
  ac.addListener('place_changed', () => {
    const place = ac.getPlace();
    if (!place.geometry) return;
    uploadData.lat = place.geometry.location.lat();
    uploadData.lng = place.geometry.location.lng();
    uploadData.adresse = place.formatted_address;
    document.getElementById('up-coords').style.display = 'block';
    document.getElementById('up-coords-text').textContent =
      `${uploadData.lat.toFixed(5)}, ${uploadData.lng.toFixed(5)}`;
    const warn = document.getElementById('up-no-coords-warn');
    if (warn) warn.style.display = 'none';
  });
}

function parseCoordsInput(val) {
  const m = val.trim().match(/^(-?\d+\.?\d*)[,\s]+(-?\d+\.?\d*)$/);
  if (!m) return;
  uploadData.lat = parseFloat(m[1]);
  uploadData.lng = parseFloat(m[2]);
  document.getElementById('up-coords').style.display = 'block';
  document.getElementById('up-coords-text').textContent =
    `${uploadData.lat.toFixed(5)}, ${uploadData.lng.toFixed(5)}`;
  const warn = document.getElementById('up-no-coords-warn');
  if (warn) warn.style.display = 'none';
}

function submitUpload() {
  if (!uploadData.name || !uploadData.standort) { alert('Name und Standort sind Pflichtfelder.'); return; }
  if (!uploadData.datum) { alert('Bitte ein Datum eingeben.'); return; }
  const uhr = uploadData.uhrzeit || '20:00';
  const datumISO = `${uploadData.datum}T${uhr}:00.000Z`;
  const btn = document.getElementById('btn-upload-submit');
  btn.disabled = true;
  btn.textContent = '⏳ Speichert…';
  const eintrittText = uploadData.eintritt.trim();
  const beschreibungText = uploadData.beschreibung.trim();
  const combinedBeschreibung = eintrittText && beschreibungText
    ? eintrittText + '\n\n' + beschreibungText
    : eintrittText || beschreibungText;

  db.collection('events').add({
    name: uploadData.name,
    datum: datumISO,
    uhrzeit: uhr,
    standort: uploadData.standort,
    gemeinde: uploadData.standort,
    adresse: uploadData.adresse || '',
    bezirk: uploadData.bezirk || '',
    beschreibung: combinedBeschreibung,
    eintritt: uploadData.eintritt || '',
    typ: uploadData.typ || 'e1',
    lat: uploadData.lat || null,
    lng: uploadData.lng || null,
    id: Date.now().toString(),
    createdAt: firebase.firestore.FieldValue.serverTimestamp(),
  }).then(() => db.collection('pending_events').doc(uploadPendingId).update({ inApp: true }))
    .then(() => { closeUpload(); showToast('✓ ' + uploadData.name + ' in App gespeichert'); })
    .catch(e => {
      btn.disabled = false;
      btn.textContent = '↑ In App speichern';
      alert('Fehler: ' + e.message);
    });
}

function showToast(msg, ok) {
  const t = document.getElementById('mgr-toast');
  t.textContent = msg;
  t.style.background = ok === false ? '#c0392b' : '#27AE60';
  t.style.display = 'block';
  setTimeout(() => t.style.display = 'none', 3000);
}

// ---- UTILS ----
function esc(s){if(!s)return"";return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");}
