<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EventRide Manager</title>
<link rel="icon" type="image/png" href="../assets/icon/app_icon.png" />
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
<style>
/* ── Design tokens ── */
:root{
  --bg:#F6F8FA;
  --surface:#FFFFFF;
  --surface-2:#F3F4F6;
  --surface-3:#E5E7EB;
  --border:rgba(31,35,40,.14);
  --border-sub:rgba(31,35,40,.07);
  --text:#1C2128;
  --text-2:#57606A;
  --text-3:#8C959F;
  --accent:#F5A04A;
  --accent-h:#E08930;
  --accent-soft:rgba(245,160,74,.10);
  --green:#1A7F37;
  --green-bg:rgba(26,127,55,.08);
  --green-t:#0D4A1F;
  --red:#CF222E;
  --red-bg:rgba(207,34,46,.08);
  --red-t:#82071E;
  --blue:#0969DA;
  --blue-bg:rgba(9,105,218,.08);
  --blue-t:#0A3069;
  --purple:#8250DF;
  --sh0:none;
  --sh1:0 1px 3px rgba(31,35,40,.08),0 0 0 1px rgba(31,35,40,.06);
  --sh2:0 8px 24px rgba(31,35,40,.12);
  --sh3:0 24px 64px rgba(31,35,40,.16),0 8px 24px rgba(31,35,40,.08);
  --r:8px;--rs:6px;--rx:4px;
  color-scheme:light;
}
[data-theme=dark]{
  --bg:#0D1117;
  --surface:#161B22;
  --surface-2:#21262D;
  --surface-3:#30363D;
  --border:rgba(240,246,252,.12);
  --border-sub:rgba(240,246,252,.06);
  --text:#E6EDF3;
  --text-2:#848D97;
  --text-3:rgba(230,237,243,.38);
  --accent:#F5A04A;
  --accent-h:#E08930;
  --accent-soft:rgba(245,160,74,.12);
  --green:#3FB950;
  --green-bg:rgba(63,185,80,.10);
  --green-t:#3FB950;
  --red:#F85149;
  --red-bg:rgba(248,81,73,.10);
  --red-t:#F85149;
  --blue:#58A6FF;
  --blue-bg:rgba(88,166,255,.10);
  --blue-t:#58A6FF;
  --purple:#BC8CFF;
  --sh0:none;
  --sh1:0 1px 3px rgba(0,0,0,.45),0 0 0 1px rgba(240,246,252,.08);
  --sh2:0 8px 24px rgba(0,0,0,.55);
  --sh3:0 24px 64px rgba(0,0,0,.72),0 8px 24px rgba(0,0,0,.48);
  color-scheme:dark;
}

/* ── Base ── */
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Inter','Segoe UI',sans-serif;background:var(--bg);color:var(--text);font-size:15px;line-height:1.6;-webkit-font-smoothing:antialiased;transition:background .2s,color .2s}
a{color:var(--accent);text-decoration:none}
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:8px}

/* ── Buttons ── */
button{font-family:inherit;font-size:13px;font-weight:500;cursor:pointer;border:1px solid var(--border);background:var(--surface);color:var(--text);border-radius:var(--rs);padding:6px 14px;transition:all .12s;white-space:nowrap;line-height:1.4;box-shadow:none}
button:hover{background:var(--surface-2)}
button.primary{background:var(--accent);color:#fff;border-color:transparent;font-weight:600}
button.primary:hover{background:var(--accent-h);transform:translateY(-1px);box-shadow:0 4px 14px rgba(245,160,74,.30)}
button.primary:active{transform:none;box-shadow:none}
button.danger{color:var(--red);border-color:transparent;background:transparent;font-size:12px;padding:4px 10px}
button.danger:hover{background:var(--red-bg)}
button.small{padding:4px 10px;font-size:12px}
button.small.active-sort{background:var(--accent);color:#fff;border-color:var(--accent)}
button.icon-btn{border:none;background:none;padding:6px;font-size:16px;line-height:1;border-radius:var(--rx);color:var(--text-2)}
button.icon-btn:hover{background:var(--surface-2);color:var(--text)}
.theme-toggle{gap:5px;font-size:12px;font-weight:500;color:var(--text-2)}

/* ── Inputs ── */
input,select,textarea{font-family:inherit;font-size:13px;border:1px solid var(--border);border-radius:var(--rs);padding:7px 11px;width:100%;background:var(--surface);color:var(--text);transition:border-color .12s,box-shadow .12s;line-height:1.4}
input:focus,select:focus,textarea:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-soft)}
select option{background:var(--surface);color:var(--text)}

/* ── Card (generic) ── */
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r)}

/* ── Badges ── */
.badge{display:inline-flex;align-items:center;font-size:11px;font-weight:500;padding:1px 8px;border-radius:100px;white-space:nowrap;letter-spacing:.01em;border:1px solid transparent}
.badge-kirchtag{background:rgba(245,158,11,.10);color:#B45309;border-color:rgba(245,158,11,.20)}
.badge-feuerwehr{background:rgba(34,197,94,.09);color:#15803D;border-color:rgba(34,197,94,.18)}
.badge-ball{background:rgba(168,85,247,.09);color:#7E22CE;border-color:rgba(168,85,247,.18)}
.badge-krampus{background:rgba(99,102,241,.09);color:#4338CA;border-color:rgba(99,102,241,.18)}
.badge-disco{background:rgba(14,165,233,.09);color:#0369A1;border-color:rgba(14,165,233,.18)}
.badge-festival{background:rgba(249,115,22,.09);color:#C2410C;border-color:rgba(249,115,22,.18)}
.badge-confirmed{background:rgba(34,197,94,.09);color:#15803D;border-color:rgba(34,197,94,.18)}
.badge-check{background:rgba(245,158,11,.10);color:#B45309;border-color:rgba(245,158,11,.20)}
.badge-inapp{background:rgba(14,165,233,.09);color:#0369A1;border-color:rgba(14,165,233,.18)}
.badge-geprueft{background:rgba(0,0,0,.04);color:var(--text-2);border-color:var(--border)}
[data-theme=dark] .badge-kirchtag{background:rgba(251,191,36,.10);color:#FCD34D;border-color:rgba(251,191,36,.18)}
[data-theme=dark] .badge-feuerwehr{background:rgba(52,211,153,.10);color:#34D399;border-color:rgba(52,211,153,.18)}
[data-theme=dark] .badge-ball{background:rgba(192,132,252,.10);color:#C084FC;border-color:rgba(192,132,252,.18)}
[data-theme=dark] .badge-krampus{background:rgba(129,140,248,.10);color:#818CF8;border-color:rgba(129,140,248,.18)}
[data-theme=dark] .badge-disco{background:rgba(56,189,248,.10);color:#38BDF8;border-color:rgba(56,189,248,.18)}
[data-theme=dark] .badge-festival{background:rgba(251,146,60,.10);color:#FB923C;border-color:rgba(251,146,60,.18)}
[data-theme=dark] .badge-confirmed{background:rgba(52,211,153,.10);color:#34D399;border-color:rgba(52,211,153,.18)}
[data-theme=dark] .badge-check{background:rgba(251,191,36,.10);color:#FCD34D;border-color:rgba(251,191,36,.18)}
[data-theme=dark] .badge-inapp{background:rgba(56,189,248,.10);color:#38BDF8;border-color:rgba(56,189,248,.18)}
[data-theme=dark] .badge-geprueft{background:rgba(255,255,255,.05);color:var(--text-2);border-color:var(--border)}

/* ── Login ── */
.login-wrap{display:flex;align-items:center;justify-content:center;min-height:100vh;background:var(--bg)}
[data-theme=dark] .login-wrap{background:#0D1117}
.login-box{background:var(--surface);border-radius:12px;padding:2.75rem;text-align:center;width:380px;box-shadow:var(--sh3);border:1px solid var(--border)}
.login-logo{font-size:30px;font-weight:800;letter-spacing:-.5px;color:var(--text);margin-bottom:6px}
.login-logo span{color:var(--accent)}
.login-sub{font-size:11px;font-weight:600;letter-spacing:1.2px;text-transform:uppercase;color:var(--text-3);margin-bottom:2.5rem}

/* ── Layout ── */
.app-wrap{max-width:1440px;margin:0 auto;padding:0 2rem 5rem}
.header{display:flex;align-items:center;justify-content:space-between;padding:1rem 0;border-bottom:1px solid var(--border);margin-bottom:2.5rem;background:var(--bg);position:sticky;top:0;z-index:50;transition:background .2s;gap:16px}
.header-logo{font-size:15px;font-weight:700;letter-spacing:-.2px;color:var(--text)}
.header-logo span{color:var(--accent)}
.header-label{font-size:11px;font-weight:500;color:var(--text-3);letter-spacing:.4px;margin-left:8px;vertical-align:middle;text-transform:uppercase}

/* ── Stats — connected grid, no individual boxes ── */
.stats-row{display:grid;grid-template-columns:repeat(6,1fr);gap:1px;background:var(--border);border:1px solid var(--border);border-radius:var(--r);overflow:hidden;margin-bottom:2.5rem}
.stat-card{background:var(--surface);padding:20px 22px 24px;position:relative;overflow:hidden;transition:background .12s}
.stat-card:hover{background:var(--surface-2)}
.stat-card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px}
.stat-card:nth-child(1)::before{background:var(--accent)}
.stat-card:nth-child(2)::before{background:var(--green)}
.stat-card:nth-child(3)::before{background:#F59E0B}
.stat-card:nth-child(4)::before{background:var(--blue)}
.stat-card:nth-child(5)::before{background:var(--purple)}
.stat-card:nth-child(6)::before{background:var(--red)}
.stat-num{font-size:34px;font-weight:700;line-height:1;letter-spacing:-2px;color:var(--text);margin-top:10px;font-variant-numeric:tabular-nums}
.stat-lbl{font-size:12px;color:var(--text-2);margin-top:5px;font-weight:400}

/* ── Tabs ── */
.tabs{display:flex;border-bottom:1px solid var(--border);margin-bottom:2rem;gap:0}
.tab-btn{padding:10px 18px;font-size:13px;cursor:pointer;border:none;border-bottom:2px solid transparent;margin-bottom:-1px;background:transparent;color:var(--text-2);border-radius:0;font-weight:500;transition:color .12s,border-color .12s;box-shadow:none;letter-spacing:.01em}
.tab-btn.active{color:var(--text);border-bottom-color:var(--accent);font-weight:600}
.tab-btn:hover:not(.active){color:var(--text);background:none}

/* ── Grid ── */
.main-grid{display:grid;grid-template-columns:1fr;gap:16px}
.main-grid.has-detail{grid-template-columns:1fr 440px}

/* ── Filter bar — no card wrapper ── */
.filter-bar{display:flex;gap:8px;flex-wrap:wrap;align-items:center;margin-bottom:14px}
.filter-bar input,.filter-bar select{width:auto;font-size:13px;padding:6px 11px;border-radius:var(--rs);background:var(--surface);border:1px solid var(--border)}
.filter-bar input[type=text]{width:200px}
.filter-count{font-size:12px;color:var(--text-3);margin-left:auto;white-space:nowrap;font-weight:400}

/* ── Event list — GitHub issues style ── */
.event-list-wrap{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);overflow:hidden}
.event-row{display:flex;align-items:center;gap:14px;padding:16px 20px;cursor:pointer;border-bottom:1px solid var(--border-sub);border-left:3px solid transparent;transition:background .1s}
.event-row:last-child{border-bottom:none}
.event-row:hover{background:var(--surface-2)}
.event-row.selected{background:var(--accent-soft);border-left-color:var(--accent)}
.event-row.status-check{border-left-color:#F59E0B}
.event-row.status-confirmed{border-left-color:var(--green)}
.event-row.status-inapp{border-left-color:var(--blue)}
.event-row.past{opacity:.38}
.event-name{flex:1;font-size:14px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;letter-spacing:-.1px;line-height:1.4}
.event-meta{font-size:12px;color:var(--text-2);margin-top:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;line-height:1.3}
.event-date{font-size:11px;font-weight:500;white-space:nowrap;color:var(--text-3)}
.event-icons{display:flex;gap:4px;justify-content:flex-end;margin-top:3px}
.icon-check{color:var(--green);font-size:11px;font-weight:700}
.icon-upload{color:var(--blue);font-size:11px}

/* ── Detail panel ── */
.detail-panel{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);position:sticky;top:76px;max-height:calc(100vh - 92px);overflow-y:auto;display:flex;flex-direction:column}
.detail-top{padding:24px;border-bottom:1px solid var(--border-sub)}
.detail-name{font-size:17px;font-weight:700;margin-bottom:10px;line-height:1.35;letter-spacing:-.3px}
.detail-badges{display:flex;gap:6px;flex-wrap:wrap}
.detail-body{padding:22px 24px;flex:1}
.detail-section{margin-bottom:24px}
.detail-section-title{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:var(--text-3);margin-bottom:10px}
.field-grid{display:grid;grid-template-columns:90px 1fr;gap:7px 14px;font-size:13px;align-items:start}
.field-lbl{color:var(--text-3);padding-top:1px;font-weight:400}
.field-val{color:var(--text);word-break:break-word}
.field-val.mono{font-family:'SFMono-Regular',Consolas,monospace;font-size:12px;color:var(--text-2)}
.section-div{border-top:1px solid var(--border-sub);margin:18px 0}

/* ── Warn / info ── */
.warn-box{background:#FFFBEB;border:1px solid rgba(245,158,11,.28);border-radius:var(--rs);padding:14px 16px;margin-bottom:14px}
.warn-box-title{font-size:11px;font-weight:700;color:#92400E;margin-bottom:6px;text-transform:uppercase;letter-spacing:.5px}
.info-box{background:var(--blue-bg);border:1px solid rgba(9,105,218,.16);border-radius:var(--rs);padding:12px 16px;font-size:13px;color:var(--blue-t);margin-bottom:14px}
[data-theme=dark] .warn-box{background:rgba(251,191,36,.07);border-color:rgba(251,191,36,.22)}
[data-theme=dark] .warn-box-title{color:#FCD34D}

/* ── Checkboxes ── */
.check-label{display:flex;align-items:center;gap:10px;cursor:pointer;font-size:13px;padding:6px 0;color:var(--text)}
.check-label input[type=checkbox]{width:16px;height:16px;accent-color:var(--accent);cursor:pointer;flex-shrink:0}

/* ── Edit form ── */
.edit-grid{display:grid;grid-template-columns:96px 1fr;gap:8px 12px;margin-bottom:1rem;align-items:center;font-size:13px}
.edit-label{color:var(--text-2);font-size:12px;font-weight:500}

/* ── Modals ── */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.55);display:flex;align-items:center;justify-content:center;z-index:200}
/* pac-container is appended to body by Google Maps — must float above everything */
.pac-container{z-index:2147483647!important;pointer-events:auto!important}
.modal{background:var(--surface);border-radius:12px;padding:2rem;width:480px;max-height:92vh;overflow-y:auto;box-shadow:var(--sh3);border:1px solid var(--border)}
.modal h3{font-size:16px;font-weight:700;margin-bottom:1.25rem;letter-spacing:-.3px}
.modal-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:1.5rem}
.btn-row{display:flex;gap:8px}
.btn-row button{flex:1}

/* ── Bezirke ── */
.bez-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);margin-bottom:8px;overflow:hidden}
.bez-header{display:flex;align-items:center;justify-content:space-between;padding:14px 18px;cursor:pointer;transition:background .12s;font-size:14px;font-weight:600}
.bez-header:hover{background:var(--surface-2)}
.bez-body{border-top:1px solid var(--border-sub)}
.gem-row{display:flex;align-items:center;justify-content:space-between;padding:9px 18px 9px 32px;font-size:13px;border-bottom:1px solid var(--border-sub);cursor:pointer;transition:background .12s;color:var(--text)}
.gem-row:last-child{border-bottom:none}
.gem-row:hover{background:var(--surface-2)}
.gem-row.no-events{color:var(--text-3)}
.gem-row.no-events .gem-count{color:var(--text-3)}
.gem-count{font-size:12px;color:var(--text-3)}
.gem-event{padding:8px 18px 8px 44px;font-size:13px;border-bottom:1px solid var(--border-sub);cursor:pointer;display:flex;align-items:center;gap:8px;transition:background .12s;color:var(--text)}
.gem-event:last-child{border-bottom:none}
.gem-event:hover{background:var(--surface-2)}

/* ── Upload / Vorschlag ── */
.url-preview{font-family:'SFMono-Regular',Consolas,monospace;font-size:11px;color:var(--text-3);word-break:break-all;background:var(--surface-2);padding:8px 12px;border-radius:var(--rx);margin-bottom:10px;max-height:52px;overflow:hidden;border:1px solid var(--border-sub)}
.tag-new{background:var(--blue-bg);color:var(--blue-t);font-size:11px;padding:1px 8px;border-radius:100px;margin-left:6px;font-weight:600;border:1px solid rgba(9,105,218,.14)}
[data-theme=dark] .tag-new{border-color:rgba(88,166,255,.14)}

/* ── Toast ── */
#mgr-toast{display:none;position:fixed;bottom:32px;left:50%;transform:translateX(-50%);padding:12px 24px;border-radius:8px;font-size:13px;font-weight:600;color:#fff;z-index:999;box-shadow:var(--sh3);letter-spacing:.01em}

/* ── Empty state ── */
.empty-state{text-align:center;padding:7rem 2rem;color:var(--text-3);font-size:14px;line-height:2.2}

/* ── Inapp detail ── */
.inapp-id{font-family:'SFMono-Regular',Consolas,monospace;font-size:12px;color:var(--text-2);background:var(--surface-2);border:1px solid var(--border);padding:4px 9px;border-radius:var(--rx);display:inline-block;margin-top:4px}

/* ── CSV progress ── */
@keyframes spin{to{transform:rotate(360deg)}}
.csv-spinner{width:16px;height:16px;border:2px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .6s linear infinite;flex-shrink:0}
.csv-progress{background:var(--surface);border:1px solid var(--border);border-radius:var(--rs);padding:18px 20px;margin-top:14px}
.csv-progress-row{display:flex;align-items:center;gap:10px;font-size:13px;margin-bottom:8px;color:var(--text)}
.csv-progress-row:last-child{margin-bottom:0}
.csv-stat{display:flex;align-items:center;gap:8px;padding:8px 12px;border-radius:var(--rs);font-size:13px}
.csv-stat.new{background:var(--green-bg);color:var(--green-t)}
.csv-stat.skipped{background:var(--surface-2);color:var(--text-2)}
.csv-stat.error{background:var(--red-bg);color:var(--red-t)}

/* ── Duplicate grouping ── */
.event-row.has-dupes{border-bottom:none}
.dupe-group{border-bottom:1px solid var(--border-sub);border-left:3px solid #F59E0B;background:var(--surface-2)}
.dupe-row{display:flex;align-items:center;gap:8px;padding:8px 16px 8px 30px;border-bottom:1px solid var(--border-sub);font-size:13px;color:var(--text)}
.dupe-row:last-child{border-bottom:none}
.dupe-actions{display:flex;gap:5px;flex-shrink:0;margin-left:8px}

@media(max-width:900px){
  .main-grid.has-detail{grid-template-columns:1fr}
  .stats-row{grid-template-columns:repeat(3,1fr)}
  .detail-panel{position:static;max-height:none}
  .app-wrap{padding:0 1rem 3rem}
}

/* ── IG Accounts Tab ── */
.ig-table-wrap{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);overflow:hidden;overflow-x:auto}
.ig-table{width:100%;border-collapse:collapse;font-size:13px;min-width:700px}
.ig-table th{padding:10px 14px;text-align:left;font-size:11px;font-weight:600;letter-spacing:.5px;text-transform:uppercase;color:var(--text-3);border-bottom:1px solid var(--border);background:var(--surface-2);white-space:nowrap;cursor:pointer;user-select:none}
.ig-table th:hover{color:var(--text)}
.ig-table td{padding:10px 14px;border-bottom:1px solid var(--border-sub);vertical-align:middle;color:var(--text)}
.ig-table tbody tr:last-child td{border-bottom:none}
.ig-table tbody tr:hover td{background:var(--surface-2)}
.ig-username{font-family:'SFMono-Regular',Consolas,monospace;font-size:12px;color:var(--accent)}
.badge-ig-offen{background:rgba(245,160,74,.12);color:#7A4A00;border-color:rgba(245,160,74,.25)}
.badge-ig-geprueft{background:var(--surface-2);color:var(--text-2);border-color:var(--border)}
.badge-ig-termin{background:rgba(26,127,55,.10);color:var(--green-t);border-color:rgba(26,127,55,.20)}
.badge-ig-irrelevant{background:rgba(207,34,46,.06);color:var(--red-t);border-color:rgba(207,34,46,.12)}
[data-theme=dark] .badge-ig-offen{color:#FAC775;border-color:rgba(245,160,74,.28)}
[data-theme=dark] .badge-ig-termin{color:#3FB950;border-color:rgba(63,185,80,.24)}
[data-theme=dark] .badge-ig-irrelevant{color:#F85149;border-color:rgba(248,81,73,.20)}
.ig-stat-chip{background:var(--surface);border:1px solid var(--border);border-radius:var(--rs);padding:14px 18px;flex:1;min-width:100px;text-align:center}
.ig-stat-num{font-size:26px;font-weight:700;line-height:1;letter-spacing:-1px;font-variant-numeric:tabular-nums}

// ---- DATE UTILS ----
function parseDatum(s) {
  if(!s) return null;
  let m = s.match(/^(\d{2})\.(\d{2})\.(\d{4})$/);
  if(m) return new Date(+m[3], +m[2]-1, +m[1]);
  m = s.match(/^(\d{4})-(\d{2})-(\d{2})$/);
  if(m) return new Date(+m[1], +m[2]-1, +m[3]);
  m = s.match(/^(\d{4})-(\d{2})-(\d{2})T/);
  if(m) return new Date(+m[1], +m[2]-1, +m[3]);
  return null;
}
function fmt(s) {
  const d = parseDatum(s);
  if(!d) return s||"";
  return d.toLocaleDateString("de-AT",{day:"2-digit",month:"2-digit",year:"numeric"});
}
function monthDay(s) {
  const d = parseDatum(s);
  if(!d) return 9999;
  return d.getMonth() * 100 + d.getDate();
}
function getYear(s) { const d=parseDatum(s); return d?d.getFullYear():0; }
function isCheck(ev) { return ev.status==="check" || getYear(ev.datum)<2026; }
function isPast(s) { const d=parseDatum(s); if(!d) return false; const t=new Date();t.setHours(0,0,0,0);return d<t; }

function isMonthDayPast(s, bufferDays=5) {
  const d = parseDatum(s);
  if(!d) return false;
  const today = new Date(); today.setHours(0,0,0,0);
  const thisYear = new Date(today.getFullYear(), d.getMonth(), d.getDate());
  const cutoff = new Date(today); cutoff.setDate(cutoff.getDate() - bufferDays);
  return thisYear < cutoff;
}

}

// ---- DUPLICATE DETECTION ----
function normalizeName(s) {
  return (s||'').toLowerCase().trim()
    .replace(/\b(20\d\d)\b/g,'')
    .replace(/[-–—\/\\.,!?()]/g,' ')
    .replace(/[^a-zäöüß\s]/g,'')
    .replace(/\s+/g,' ').trim();
}

function levenshtein(a,b) {
  if(!a.length) return b.length;
  if(!b.length) return a.length;
  const m=Array.from({length:b.length+1},(_,i)=>[i]);
  for(let j=0;j<=a.length;j++) m[0][j]=j;
  for(let i=1;i<=b.length;i++)
    for(let j=1;j<=a.length;j++)
      m[i][j]=b[i-1]===a[j-1]?m[i-1][j-1]:1+Math.min(m[i-1][j],m[i][j-1],m[i-1][j-1]);
  return m[b.length][a.length];
}

function isSimilarName(nameA,nameB) {
  const a=normalizeName(nameA), b=normalizeName(nameB);
  if(!a||!b) return false;
  if(a===b) return true;
  if(a.includes(b)||b.includes(a)) return true;
  if(Math.min(a.length,b.length)<8) return false;
  return levenshtein(a,b)/Math.max(a.length,b.length)<0.2;
}

function isSimilarEvent(a,b) {
  if(a._id===b._id) return false;
  if(!a.bezirk||!b.bezirk||a.bezirk!==b.bezirk) return false;
  return isSimilarName(a.name,b.name);
}

// Hard dupe: same normalized name + same bezirk + same date (for CSV auto-skip)
function isHardDupe(name,bezirk,datum,alreadyAdded) {
  const n=normalizeName(name);
  const d=parseDatum(datum);
  if(!d) return false;
  const dKey=`${d.getFullYear()}-${d.getMonth()}-${d.getDate()}`;
  if(alreadyAdded&&alreadyAdded.has(`${n}|${bezirk}|${dKey}`)) return true;
  return [...appEvents,...pending].some(e=>{
    if(normalizeName(e.name)!==n||e.bezirk!==bezirk) return false;
    const ed=parseDatum(e.datum);
    if(!ed) return false;
    return `${ed.getFullYear()}-${ed.getMonth()}-${ed.getDate()}`===dKey;
  });
}

// Group filtered events: primary + suspected dupes below
function buildDupeGroups(evs) {
  const used=new Set();
  const groups=[];
  for(const ev of evs) {
    if(used.has(ev._id)) continue;
    used.add(ev._id);
    if(ev.confirmedUnique) { groups.push({main:ev,dupes:[]}); continue; }
    const dupes=[];
    for(const other of evs) {
      if(used.has(other._id)||other.confirmedUnique) continue;
      if(isSimilarEvent(ev,other)) { dupes.push(other); used.add(other._id); }
    }
    groups.push({main:ev,dupes});
  }
  return groups;
}

function markNotDupe(id) {
  updPending(id,{confirmedUnique:true});
}

// Similar events already in Firebase (for upload warning)
function similarInApp(name,bezirk) {
  return appEvents.filter(e=>isSimilarName(e.name,name)&&(!bezirk||e.bezirk===bezirk));
}

    {l:"Bereit",v:s.pending_ready,c:"#3B6D11"},
    {l:"Bevorstehend",v:s.upcoming,c:"#853606"}
  ].map(x=>`<div class="stat-card"><div class="stat-num" style="color:${x.c}">${x.v}</div><div class="stat-lbl">${x.l}</div></div>`).join("");
}

// ---- RENDER ROUTING ----
function render() {
  renderStats();
  if(curTab==="recherche") renderRecherche();
  else if(curTab==="inapp") renderInApp();
  else if(curTab==="bezirke") renderBezirke();
  else if(curTab==="csv") renderCSV();
  else if(curTab==="flyer") renderFlyer();
  else if(curTab==="accounts") renderAccounts();
}

function switchTab(t) {
  curTab = t; selId = null; editMode = false;
  document.querySelectorAll(".tab-btn").forEach(b=>b.classList.remove("active"));
  document.getElementById("tab-"+t).classList.add("active");
  render();
}

// ---- RECHERCHE TAB ----
function getFiltered() {
  let evs = [...pending];
  if(!showPast) evs = evs.filter(e=>!isMonthDayPast(e.datum));
  if(fBez!=="Alle") evs = evs.filter(e=>e.bezirk===fBez);
  if(fTyp!=="Alle") evs = evs.filter(e=>e.typ===fTyp);
  if(fStatus==="confirmed") evs = evs.filter(e=>!isCheck(e));
  else if(fStatus==="check") evs = evs.filter(e=>isCheck(e));
  else if(fStatus==="geprueft") evs = evs.filter(e=>e.geprueft);
  else if(fStatus==="ready") evs = evs.filter(e=>e.geprueft&&!isCheck(e)&&!e.inApp);
  else if(fStatus==="inApp") evs = evs.filter(e=>e.inApp);
  if(fInfoAusstehend) evs = evs.filter(e=>e.infoAusstehend);
  if(fSearch) { const q=fSearch.toLowerCase(); evs=evs.filter(e=>(e.name||"").toLowerCase().includes(q)||(e.gemeinde||"").toLowerCase().includes(q)); }
  evs.sort((a,b)=>{
    const ma=monthDay(a.datum), mb=monthDay(b.datum);
    return sortDir==="asc"?(ma-mb):(mb-ma);
  });
  return evs;
}

function renderRecherche() {
  const searchEl = document.getElementById("recherche-search");
  const hadFocus = searchEl && document.activeElement === searchEl;
  const cursorPos = hadFocus ? searchEl.selectionStart : -1;

  const evs = getFiltered();
  const sel = selId ? pending.find(e=>e._id===selId) : null;
  const gridClass = sel ? "main-grid has-detail" : "main-grid";
  const hasFilter = fBez!=="Alle"||fTyp!=="Alle"||fStatus!=="Alle"||fSearch||fInfoAusstehend;

  document.getElementById("content").innerHTML = `
  <div class="${gridClass}">
    <div>
      <div class="filter-bar">
        <input id="recherche-search" type="text" placeholder="Name / Ort suchen…" value="${fSearch}" oninput="fSearch=this.value;render()">
        <select onchange="fBez=this.value;render()">
          <option value="Alle" ${fBez==="Alle"?"selected":""}>Alle Bezirke</option>
          ${BEZIRKE.map(b=>`<option ${fBez===b?"selected":""}>${b}</option>`).join("")}
        </select>
        <select onchange="fTyp=this.value;render()">
          <option value="Alle" ${fTyp==="Alle"?"selected":""}>Alle Typen</option>
          ${TYPEN.map(t=>`<option ${fTyp===t?"selected":""}>${t}</option>`).join("")}
        </select>
        <select onchange="fStatus=this.value;render()">
          <option value="Alle" ${fStatus==="Alle"?"selected":""}>Alle Status</option>
          <option value="confirmed" ${fStatus==="confirmed"?"selected":""}>2026 bestätigt</option>
          <option value="check" ${fStatus==="check"?"selected":""}>Datum prüfen</option>
          <option value="geprueft" ${fStatus==="geprueft"?"selected":""}>Manuell geprüft</option>
          <option value="ready" ${fStatus==="ready"?"selected":""}>Bereit zum Upload</option>
          <option value="inApp" ${fStatus==="inApp"?"selected":""}>In App hochgeladen</option>
        </select>
        <button class="small" onclick="sortDir=sortDir==='asc'?'desc':'asc';render()">
          ${sortDir==="asc"?"↑ Datum":"↓ Datum"}
        </button>
        <button class="small" onclick="showPast=!showPast;render()" style="${showPast?"background:#f0f0ee;font-weight:600":""}">
          ${showPast?"Vergangene: an":"Vergangene: aus"}
        </button>
        <button class="small" onclick="fInfoAusstehend=!fInfoAusstehend;render()" style="${fInfoAusstehend?"background:var(--accent);color:#fff;border-color:var(--accent)":""}">⏳ Ausstehend</button>
        ${hasFilter?`<button class="small danger" onclick="fBez='Alle';fTyp='Alle';fStatus='Alle';fSearch='';fInfoAusstehend=false;render()">✕ Filter</button>`:""}
        <span class="filter-count">${evs.length} Events</span>
      </div>
      <div class="event-list-wrap">
        ${evs.length===0
          ?`<div class="empty-state">Keine Events gefunden.</div>`
          :buildDupeGroups(evs).map(g=>renderGroup(g)).join("")}
      </div>
    </div>
    ${sel?`<div>${detailPanel(sel)}</div>`:""}
  </div>`;

  if (hadFocus) {
    const el = document.getElementById("recherche-search");
    if (el) { el.focus(); if (cursorPos >= 0) el.setSelectionRange(cursorPos, cursorPos); }
  }
}

function eventRow(ev, hasDupes=false) {
  const check = isCheck(ev);
  const past = isPast(ev.datum);
  const isSel = selId===ev._id;
  const inApp = ev.inApp || appEvents.some(a=>a.name.trim().toLowerCase()===ev.name.trim().toLowerCase());
  const similarApp = !inApp && similarInApp(ev.name, ev.bezirk).length > 0;
  let statusClass = check ? "status-check" : (inApp ? "status-inapp" : "status-confirmed");

  const icons = [];
  if(ev.geprueft) icons.push(`<span class="icon-check" title="Manuell geprüft">✓</span>`);
  if(inApp) icons.push(`<span class="icon-upload" title="In App">↑</span>`);
  if(ev.infoAusstehend) icons.push(`<span style="font-size:10px;color:#D97706" title="Info noch ausstehend">⏳</span>`);
  if(similarApp) icons.push(`<span style="font-size:10px;background:#E6F1FB;color:#0C447C;padding:1px 6px;border-radius:8px;font-weight:600" title="Ähnliches Event möglicherweise bereits in App">~App</span>`);
  if(hasDupes) icons.push(`<span style="font-size:10px;background:#FFF3D6;color:#7A4A00;padding:1px 6px;border-radius:8px;font-weight:600">ähnlich</span>`);
  if(multiConfirmedIds.has(ev._id)) icons.push(`<span style="font-size:10px;background:#D1FAE5;color:#065F46;padding:1px 6px;border-radius:8px;font-weight:600">✓✓ Mehrfach</span>`);
  const qtypStyle = {web:'background:#E6F1FB;color:#0C447C',flyer:'background:#FFF3D6;color:#7A4A00',instagram:'background:#FCE7F3;color:#9D174D'};
  const qtypLabel = {web:'🌐 Web',flyer:'📄 Flyer',instagram:'📱 IG'};
  if(ev.quelleTyp && qtypLabel[ev.quelleTyp]) icons.push(`<span style="font-size:10px;${qtypStyle[ev.quelleTyp]};padding:1px 6px;border-radius:8px;font-weight:600">${qtypLabel[ev.quelleTyp]}</span>`);

  return `<div class="event-row ${statusClass} ${isSel?"selected":""} ${past&&!inApp?"past":""} ${hasDupes?"has-dupes":""}" onclick="selectEv('${ev._id}')">
    ${typBadge(ev.typ)}
    <div style="flex:1;min-width:0">
      <div class="event-name" style="color:${check?"#7A4A00":"#1a1a1a"}">${check?"⚠ ":""}${esc(ev.name)}</div>
      <div class="event-meta">${esc(ev.gemeinde)}${ev.bezirk?" · "+esc(ev.bezirk):""}</div>
    </div>
    <div style="text-align:right;flex-shrink:0">
      <div class="event-date" style="color:${past?"#e74c3c":"#555"}">${fmt(ev.datum)}</div>
      <div class="event-icons">${icons.join("")}</div>
    </div>
  </div>`;
}

function renderGroup(g) {
  let html = eventRow(g.main, g.dupes.length>0);
  if(g.dupes.length>0) {
    html += `<div class="dupe-group">`;
    for(const d of g.dupes) html += dupeRow(d);
    html += `</div>`;
  }
  return html;
}

function dupeRow(ev) {
  const check = isCheck(ev);
  const d = parseDatum(ev.datum);
  return `<div class="dupe-row">
    <span style="color:#FAC775;font-size:11px;flex-shrink:0">↳</span>
    ${typBadge(ev.typ)}
    <div style="flex:1;min-width:0">
      <span style="font-weight:500;color:${check?"#7A4A00":"#333"}">${esc(ev.name)}</span>
      <span style="color:#bbb;margin-left:6px">${esc(ev.gemeinde)} · ${fmt(ev.datum)}</span>
    </div>
    <div class="dupe-actions">
      <button class="small danger" onclick="event.stopPropagation();delPending('${ev._id}')">Löschen</button>
      <button class="small" onclick="event.stopPropagation();markNotDupe('${ev._id}')" title="Als eigenständiges Event markieren">Kein Duplikat</button>
    </div>
  </div>`;
}

function selectEv(id) {
  selId = selId===id?null:id;
  editMode = false;
  render();
}

function quellenHtml(ev) {
  const quellen = ev.quellen || [];
  const id = ev._id;
  const gemQ = (ev.gemeinde||"").replace(/'/g,"\\'");
  const bezQ = (ev.bezirk||"").replace(/'/g,"\\'");
  let html = '';

  function quelleRow(url, deleteBtn) {
    const href = url.startsWith("http") ? url : "https://" + url;
    const isIg = /instagram\.com/i.test(url) || /^@/.test(url);
    const igUser = extractInstagramUsername(url);
    const prefill = (igUser||"").replace(/'/g,"\\'");
    return `<div style="display:flex;align-items:center;gap:6px;margin-top:6px;padding:5px 8px;background:var(--surface-2);border-radius:var(--rx)">
      <span style="font-size:13px;flex-shrink:0">${isIg ? '📱' : '🔗'}</span>
      <a href="${href}" target="_blank" rel="noopener" style="font-size:12px;color:var(--accent);flex:1;word-break:break-all;min-width:0">${esc(url)}</a>
      ${isIg ? `<button class="small" style="padding:2px 8px;font-size:11px;white-space:nowrap;flex-shrink:0;color:var(--blue-t);border-color:rgba(9,105,218,.2);background:var(--blue-bg)" title="Account zu Accounts hinzufügen" onclick="openQuickIgAdd('${gemQ}','${bezQ}','${prefill}')">📱 Account</button>` : ''}
      ${deleteBtn}
    </div>`;
  }

  // Legacy quelle2 – show read-only (no delete), but WITH account button
  if (ev.quelle2 && !quellen.includes(ev.quelle2)) {
    html += quelleRow(ev.quelle2, '');
  }
  // quellen array items (with delete button)
  quellen.forEach((q, i) => {
    html += quelleRow(q, `<button class="icon-btn" style="padding:2px 6px;font-size:11px;color:var(--red-t);flex-shrink:0" onclick="removeQuelle('${id}',${i})">✕</button>`);
  });
  // Input to add new source
  html += `<div style="display:flex;gap:6px;margin-top:8px">
    <input id="quelle-inp-${id}" placeholder="Instagram, Website, Facebook …" style="font-size:12px;flex:1" onkeydown="if(event.key==='Enter'){event.preventDefault();addQuelle('${id}')}">
    <button class="small primary" style="white-space:nowrap;flex-shrink:0;padding:5px 12px" onclick="addQuelle('${id}')">＋ Quelle</button>
  </div>`;
  return html;
}

function addQuelle(id) {
  const inp = document.getElementById("quelle-inp-" + id);
  if (!inp || !inp.value.trim()) return;
  const val = inp.value.trim();
  const ev = pending.find(e => e._id === id);
  if (!ev) return;
  const quellen = [...(ev.quellen || [])];
  if (quellen.includes(val)) { showToast("Bereits vorhanden", false); return; }
  quellen.push(val);
  updPending(id, {quellen});
  inp.value = "";
  // No silent auto-add — user uses the 📱 Account button manually
}

function removeQuelle(id, index) {
  const ev = pending.find(e => e._id === id);
  if (!ev) return;
  const quellen = [...(ev.quellen || [])];
  quellen.splice(index, 1);
  updPending(id, {quellen});
}

function extractInstagramUsername(url) {
  // instagram.com/stories/username/... → extract username from stories
  const storiesM = url.match(/instagram\.com\/stories\/@?([\w.]+)/i);
  if (storiesM && storiesM[1]) return storiesM[1];
  // instagram.com/username or instagram.com/@username (profile URLs)
  const m = url.match(/instagram\.com\/@?([\w.]+)/i);
  if (m && m[1] && !['p','reel','stories','explore','tv','accounts','about','direct','ar'].includes(m[1].toLowerCase())) return m[1];
  // bare @username
  if (/^@[\w.]+$/.test(url.trim())) return url.trim().slice(1);
  return null;
}

function qigCheckExists(val) {
  clearTimeout(_qigExistsTimer);

    const username = val.replace(/^@/,"").trim();
    const msg = document.getElementById("qig-exists-msg");
    const btn = document.getElementById("quick-ig-submit");

    if (!username) {

      return;
    }
    const exists = igAccounts.find(a => a.username === username);
    if (exists) {
      msg.style.display = "block";
      msg.innerHTML = `<div style="background:var(--green-bg);border:1px solid rgba(26,127,55,.25);border-radius:var(--rs);padding:10px 14px;font-size:13px;color:var(--green-t)">✓ @${esc(username)} ist bereits in Accounts gespeichert${exists.gemeinde?" · "+esc(exists.gemeinde):""}</div>`;
      if(btn) { btn.disabled = true; btn.textContent = "Bereits gespeichert"; }
    } else {
      msg.style.display = "none";
      if(btn) { btn.disabled = false; btn.textContent = "Zu Accounts hinzufügen"; }
    }
  }, 250);

function startAppEdit(id) {
  const ev = appEvents.find(e => e._id === id);
  if (!ev) return;
  const d = parseDatum(ev.datum);
  const datumISO = d
    ? `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`
    : '';
  appEditData = { ...ev, datumISO, typ: normalizeTyp(ev.typ) };
  appEditMode = true;
  render();
  initUploadAutocomplete();
}

function cancelAppEdit() { appEditMode = false; render(); }

function saveAppEdit(id) {
  if (!appEditData.name || !appEditData.gemeinde) { alert('Name und Standort sind Pflichtfelder.'); return; }
  if (!appEditData.datumISO) { alert('Bitte ein Datum eingeben.'); return; }
  const uhr = appEditData.uhrzeit || '20:00';
  const datumISO = `${appEditData.datumISO}T${uhr}:00.000Z`;
  db.collection('events').doc(id).update({
    id: id,
    name: appEditData.name,
    datum: datumISO,
    uhrzeit: uhr,
    standort: appEditData.gemeinde,
    gemeinde: appEditData.gemeinde,
    adresse: appEditData.adresse || appEditData.gemeinde || '',
    bezirk: appEditData.bezirk || '',
    eintritt: appEditData.eintritt || '',
    beschreibung: appEditData.beschreibung || '',
    typ: normalizeTyp(appEditData.typ),
    latitude: appEditData.lat || null,
    longitude: appEditData.lng || null,
  }).then(() => {
    appEditMode = false;
    showToast('✓ ' + appEditData.name + ' aktualisiert');
  }).catch(e => alert('Fehler: ' + e.message));
}

function deleteAppEvent(id) {
  const ev = appEvents.find(e => e._id === id);
  if (!ev) return;
  if (!confirm(`"${ev.name}" wirklich aus der App löschen?\n\nDiese Aktion kann nicht rückgängig gemacht werden.`)) return;
  db.collection('events').doc(id).delete().then(() => {
    selId = null; appEditMode = false;
    showToast('🗑 ' + ev.name + ' gelöscht');
  }).catch(e => alert('Fehler: ' + e.message));
}

// ---- BEZIRKE TAB ----
function goToRecherche(bez, gem) {
  fBez = bez || 'Alle';
  fSearch = gem || '';
  switchTab('recherche');
}

function getGemEvents(gem, bez) {
  const first = gem.split(" ")[0];
  const match = e => (e.gemeinde===gem||e.gemeinde.startsWith(first)) && e.bezirk===bez;
  return [...pending.filter(match), ...appEvents.filter(match)]
    .sort((a,b)=>monthDay(a.datum)-monthDay(b.datum));
}

function getGemAccs(gem, bez) {
  const first = gem.split(" ")[0];
  return igAccounts.filter(a=>(a.gemeinde===gem||((a.gemeinde||"").startsWith(first)))&&a.bezirk===bez);
}

function gemAmpelClass(gem, bez) {
  const evs = getGemEvents(gem, bez);
  const accs = getGemAccs(gem, bez);
  const meta = gemeindeMeta[gem];
  if (!evs.length && !accs.length) {
    return meta?.rechercheStatus === "nichts_gefunden" ? "grau" : "rot";
  }
  if (accs.length && accs.every(a=>a.status==="nicht_relevant") && !evs.length) return "grau";
  if (accs.some(a=>a.status==="offen")) return "orange";
  if (evs.length) return "gruen";
  return "orange";
}

function splitCSVLine(line, sep) {
  const res = []; let cur = ''; let inQ = false;
  for(let i=0;i<line.length;i++){
    const ch=line[i];
    if(ch==='"'){if(inQ&&line[i+1]==='"'){cur+='"';i++;}else inQ=!inQ;}
    else if(ch===sep&&!inQ){res.push(cur.trim());cur='';}
    else cur+=ch;
  }
  res.push(cur.trim());
  return res;
}

function importCSV() {
  const text = document.getElementById("csv-input").value.trim();
  const lines = text.split("\n").filter(l=>l.trim());
  if(lines.length<2){setCsvMsg("Mind. Header + 1 Zeile nötig.","red");return;}

  const sep = lines[0].includes(";") ? ";" : ",";
  const hdrs = splitCSVLine(lines[0], sep).map(h=>h.toLowerCase().trim());
  const exactIdx = k => hdrs.findIndex(h=>h===k.toLowerCase());
  const iN=exactIdx("name"),iD=exactIdx("datum"),iU=exactIdx("uhrzeit"),iG=exactIdx("gemeinde"),iB=exactIdx("bezirk"),iA=exactIdx("adresse"),iV=exactIdx("veranstalter"),iE=exactIdx("eintritt"),iT=exactIdx("typ"),iQ=exactIdx("quelle"),iDesc=exactIdx("beschreibung");
  const iQT=exactIdx("quelletyp"),iQL=exactIdx("quellelink"),iSZ=exactIdx("srczitat"),iSich=exactIdx("sicherheit");
  if(iN<0||iD<0){setCsvMsg("Spalten 'name' und 'datum' fehlen.","red");return;}

  const total = lines.length - 1;
  const btn = document.getElementById("csv-import-btn");
  if(btn) btn.disabled = true;

  // Phase 1: Ladescreen zeigen, dann Analyse nach kurzem Yield
  setCsvProgress(`
    <div class="csv-progress">
      <div class="csv-progress-row">
        <div class="csv-spinner"></div>
        <span style="font-weight:500">Analysiere ${total} Events auf Duplikate…</span>
      </div>
      <div style="font-size:12px;color:#aaa;margin-top:4px">Prüfe gegen bestehende Recherche-Liste und Firebase…</div>
    </div>`);

  setTimeout(() => {
    // Phase 2: Dupe-Check + Batch aufbauen
    let added=0, dupes=0, batch=db.batch();
    const addedKeys=new Set();
    for(let i=1;i<lines.length;i++){
      const c = splitCSVLine(lines[i], sep);
      const name = c[iN]||"";
      if(!name) continue;
      const datRaw = c[iD]||"";
      const bezRaw = iB>=0?c[iB]||"":"";
      if(isHardDupe(name,bezRaw,datRaw,addedKeys)){dupes++;continue;}
      const d=parseDatum(datRaw);
      if(d) addedKeys.add(`${normalizeName(name)}|${bezRaw}|${d.getFullYear()}-${d.getMonth()}-${d.getDate()}`);
      const typRaw = (iT>=0?c[iT]||"":"").trim().split(" ")[0]||"Kirchtage/Feste";
      const yr = getYear(datRaw);
      const ref = db.collection("pending_events").doc();
      const quelleTypVal = iQT>=0?(c[iQT]||"").trim().toLowerCase():"";
      const VALID_QTYP = new Set(["web","flyer","instagram"]);
      const quelleTyp = VALID_QTYP.has(quelleTypVal)?quelleTypVal:"";
      batch.set(ref, {
        name, datum:datRaw, uhrzeit:iU>=0?(c[iU]||"").trim()||"20:00":"20:00",
        gemeinde:iG>=0?(c[iG]||"").trim():"", bezirk:bezRaw,
        adresse:iA>=0?(c[iA]||"").trim():"",
        veranstalter:iV>=0?(c[iV]||"").trim()||"örtlich":"örtlich",
        eintritt:iE>=0?(c[iE]||"").trim()||"k.A.":"k.A.",
        beschreibung:iDesc>=0?(c[iDesc]||"").trim():"",
        typ:normalizeTyp(typRaw), quelle:iQ>=0?(c[iQ]||"").trim():"", quelle2:"",
        quelleTyp, quelleLink:iQL>=0?(c[iQL]||"").trim():"",
        srcZitat:iSZ>=0?(c[iSZ]||"").trim():"",
        sicherheit:iSich>=0&&(c[iSich]||"").trim()==="sicher"?"sicher":"mittel",
        status:yr>=2026?"confirmed":"check", geprueft:false, inApp:false,
        createdAt:firebase.firestore.FieldValue.serverTimestamp()
      });
      added++;
    }

    if(added===0){
      setCsvProgress(`
        <div class="csv-progress">
          <div class="csv-progress-row" style="margin-bottom:10px">
            <span style="font-size:15px">⊘</span>
            <span style="font-weight:600">Keine neuen Events gefunden</span>
          </div>
          <div class="csv-stat skipped">
            <span style="font-size:15px">⊘</span>
            <span><strong>${dupes}</strong> von ${total} Events bereits vorhanden und übersprungen</span>
          </div>
        </div>`);
      if(btn) btn.disabled = false;
      return;
    }

    // Phase 3: Batch speichern
    setCsvProgress(`
      <div class="csv-progress">
        <div class="csv-progress-row" style="margin-bottom:10px">
          <div class="csv-spinner"></div>
          <span style="font-weight:500">Speichert ${added} Events in Firestore…</span>
        </div>
        <div style="display:flex;gap:8px;flex-wrap:wrap">
          <div class="csv-stat new">
            <span style="font-size:15px">✓</span>
            <span><strong>${added}</strong> neu</span>
          </div>
          ${dupes?`<div class="csv-stat skipped">
            <span style="font-size:15px">⊘</span>
            <span><strong>${dupes}</strong> übersprungen (bereits vorhanden)</span>
          </div>`:""}
        </div>
      </div>`);

    batch.commit().then(() => {
      document.getElementById("csv-input").value = "";
      setCsvProgress(`
        <div class="csv-progress">
          <div class="csv-progress-row" style="margin-bottom:10px">
            <span style="font-size:18px">✅</span>
            <span style="font-weight:700;font-size:14px">Import abgeschlossen</span>
          </div>
          <div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:10px">
            <div class="csv-stat new">
              <span style="font-size:15px">✓</span>
              <span><strong>${added}</strong> neue Events importiert</span>
            </div>
            ${dupes?`<div class="csv-stat skipped">
              <span style="font-size:15px">⊘</span>
              <span><strong>${dupes}</strong> übersprungen — Name + Bezirk + Datum bereits vorhanden</span>
            </div>`:""}
          </div>
          <div style="font-size:12px;color:#aaa">Weiterleitung zur Recherche-Liste…</div>
        </div>`);
      setTimeout(() => { setCsvProgress(""); switchTab("recherche"); }, 2000);
    }).catch(e => {
      setCsvProgress(`
        <div class="csv-progress">
          <div class="csv-stat error">
            <span>✕ Fehler beim Speichern: ${esc(e.message)}</span>
          </div>
        </div>`);
      if(btn) btn.disabled = false;
    });
  }, 40);
}

// ---- FLYER IMPORT ----
function importFlyerCSV() {
  const text = (document.getElementById("flyer-csv-input").value || "").trim();
  const lines = text.split("\n").filter(l => l.trim());
  if (lines.length < 2) { showToast("Mind. Header + 1 Zeile nötig.", false); return; }

  const sep = lines[0].includes(";") ? ";" : ",";
  const hdrs = splitCSVLine(lines[0], sep).map(h => h.toLowerCase().trim());
  const exactIdx = k => hdrs.findIndex(h => h === k.toLowerCase());
  const iN=exactIdx("name"),iD=exactIdx("datum"),iU=exactIdx("uhrzeit"),iG=exactIdx("gemeinde"),
        iB=exactIdx("bezirk"),iA=exactIdx("adresse"),iV=exactIdx("veranstalter"),iE=exactIdx("eintritt"),iT=exactIdx("typ"),iQ=exactIdx("quelle"),iDesc=exactIdx("beschreibung");
  const iQT=exactIdx("quelletyp"),iQL=exactIdx("quellelink"),iSZ=exactIdx("srczitat"),iSich=exactIdx("sicherheit");
  const iIgUser=exactIdx("igusername"),iIgName=exactIdx("igdisplayname"),iIgTyp=exactIdx("igtyp");
  if (iN < 0 || iD < 0) { showToast("Spalten 'name' und 'datum' fehlen.", false); return; }

  let imported = 0, dupes = 0;
  const addedKeys = new Set();

  for (let i = 1; i < lines.length; i++) {
    const c = splitCSVLine(lines[i], sep);
    const name = (c[iN] || "").trim();
    if (!name) continue;
    const datRaw = c[iD] || "";
    const bezRaw = iB >= 0 ? (c[iB] || "").trim() : "";

    if (isHardDupe(name, bezRaw, datRaw, addedKeys)) { dupes++; continue; }
    const d = parseDatum(datRaw);
    if (d) {
      const dKey = `${d.getFullYear()}-${d.getMonth()}-${d.getDate()}`;
      const inFlyer = flyerEvents.some(fe => {
        const fd = parseDatum(fe.datum);
        if (!fd) return false;
        return normalizeName(fe.name) === normalizeName(name) && fe.bezirk === bezRaw &&
          `${fd.getFullYear()}-${fd.getMonth()}-${fd.getDate()}` === dKey;
      });
      if (inFlyer) { dupes++; continue; }
      addedKeys.add(`${normalizeName(name)}|${bezRaw}|${dKey}`);
    }

    const typRaw = (iT >= 0 ? c[iT] || "" : "").trim().split(" ")[0] || "Kirchtage/Feste";
    flyerEvents.push({
      name, datum: datRaw,
      uhrzeit: (iU >= 0 ? c[iU] || "" : "").trim() || "20:00",
      gemeinde: iG >= 0 ? (c[iG] || "").trim() : "",
      bezirk: bezRaw,
      adresse: iA >= 0 ? (c[iA] || "").trim() : "",
      veranstalter: iV >= 0 ? (c[iV] || "").trim() : "örtlich",
      eintritt: iE >= 0 ? (c[iE] || "").trim() : "k.A.",
      beschreibung: iDesc >= 0 ? (c[iDesc] || "").trim() : "",
      typ: typRaw,
      quelle: iQ >= 0 ? (c[iQ] || "").trim() : "",
      quelleTyp: iQT>=0?(["web","flyer","instagram"].includes((c[iQT]||"").trim().toLowerCase())?(c[iQT]||"").trim().toLowerCase():""):"flyer",
      quelleLink: iQL>=0?(c[iQL]||"").trim():"",
      srcZitat: iSZ>=0?(c[iSZ]||"").trim():"",
      sicherheit: iSich>=0&&(c[iSich]||"").trim()==="sicher"?"sicher":"mittel",
      igUsername: iIgUser>=0?(c[iIgUser]||"").trim().replace(/^@/,""):"",
      igDisplayName: iIgName>=0?(c[iIgName]||"").trim():"",
      igTyp: iIgTyp>=0?(c[iIgTyp]||"").trim():"",
      status: "offen"
    });
    imported++;
  }

  flyerEvents.sort((a, b) => {
    const da = parseDatum(a.datum), db2 = parseDatum(b.datum);
    if (!da && !db2) return 0; if (!da) return 1; if (!db2) return -1;
    return da - db2;
  });

  const el = document.getElementById("flyer-csv-input");
  if (el) el.value = "";

  if (imported === 0) {
    showToast(`Keine neuen Events – ${dupes} Duplikat${dupes !== 1 ? "e" : ""} übersprungen`, false);
  } else {
    showToast(`✓ ${imported} importiert${dupes ? " · " + dupes + " übersprungen" : ""}`);
  }
  updateFlyerList();
}

  const hochgeladen = flyerEvents.filter(e => e.status === "hochgeladen").length;

  const uebersprungen = flyerEvents.filter(e => e.status === "übersprungen").length;

  const rows = flyerEvents.map((ev, i) => {
    const past = isPast(ev.datum);
    const statusColor = ev.status === "hochgeladen" ? "#27AE60" : ev.status === "ausstehend" ? "#D98D00" : ev.status === "übersprungen" ? "#bbb" : "#E88C2E";
    const statusLabel = ev.status === "ausstehend" ? "⏳ Recherche" : ev.status;
    return `<div class="event-row" style="opacity:${ev.status !== "offen" ? "0.55" : "1"}">

        <div class="event-date" style="color:${past && ev.status==="offen" ? "#e74c3c" : "#555"}">${fmt(ev.datum)}</div>
        <span style="font-size:11px;font-weight:600;color:${statusColor};min-width:90px;text-align:right">${statusLabel}</span>
        ${ev.status === "offen" ? `<button class="small primary" onclick="openFlyerUpload(${i})">↑</button>` : ""}

  }).join("");

  return `<div class="card" style="padding:1.5rem">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px">
      <div>
        <span style="font-size:15px;font-weight:700">Importierte Events</span>
        <span style="font-size:12px;color:#aaa;margin-left:10px">
          ${offen > 0 ? `<span style="color:#E88C2E;font-weight:600">${offen} offen</span>` : ""}
          ${hochgeladen > 0 ? `${offen > 0 || ausstehend > 0 ? " · " : ""}<span style="color:#27AE60;font-weight:600">${hochgeladen} hochgeladen</span>` : ""}
          ${ausstehend > 0 ? ` · <span style="color:#D98D00;font-weight:600">⏳ ${ausstehend} Recherche</span>` : ""}
          ${uebersprungen > 0 ? ` · <span style="color:#bbb">${uebersprungen} übersprungen</span>` : ""}
        </span>
      </div>
      <div style="display:flex;gap:8px">
        ${offen > 0 ? `<button class="primary" onclick="openFlyerUploadFlow()">↑ Alle hochladen (${offen})</button>` : ""}
        <button class="small danger" onclick="if(confirm('Alle Flyer-Events löschen?')){flyerEvents=[];updateFlyerList();}">Leeren</button>
      </div>
    </div>
    <div class="event-list-wrap">${rows}</div>
  </div>`;
}

function updateFlyerList() {
  if (curTab === "flyer") {
    const el = document.getElementById("flyer-list-section");
    if (el) el.innerHTML = flyerListHTML();
  }
}

function openFlyerUploadFlow() {
  const firstIdx = flyerEvents.findIndex(e => e.status === "offen");
  if (firstIdx >= 0) openFlyerUpload(firstIdx);
}

function openFlyerUpload(index) {
  flyerUploadIndex = index;
  isFlyerMode = true;
  const ev = flyerEvents[index];
  if (!ev) return;

  const d = parseDatum(ev.datum);
  const datumISO = d
    ? `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`
    : '';
  const uhr = ev.uhrzeit === 'ganztags' ? '20:00' : (ev.uhrzeit || '20:00');
  uploadData = {
    name: ev.name || '', datum: datumISO, uhrzeit: uhr,
    standort: ev.gemeinde || '', adresse: ev.adresse || '',
    bezirk: ev.bezirk || '', typ: normalizeTyp(ev.typ),
    eintritt: (ev.eintritt === 'k.A.' ? '' : ev.eintritt) || '',
    beschreibung: ev.beschreibung || '',
    latitude: ev.latitude ?? ev.lat ?? null,
    longitude: ev.longitude ?? ev.lng ?? null,
    igUsername: (ev.igUsername || '').replace(/^@/, '').trim(),
    igDisplayName: ev.igDisplayName || ev.veranstalter || '',
    igTyp: ev.igTyp || '',
    quelleLink: ev.quelleLink || '',
    quellen: [],
    infoAusstehend: false,
    notiz: '',
  };

  const allOffen = flyerEvents.filter(e => e.status === "offen");
  const pos = allOffen.indexOf(ev) + 1;
  document.getElementById('upload-modal-title').textContent =
    `Flyer hochladen (${pos} von ${allOffen.length})`;

  document.getElementById('upload-form-content').innerHTML = uploadFormHTML();
  document.getElementById('up-eintritt').value = uploadData.eintritt;
  document.getElementById('up-beschreibung').value = uploadData.beschreibung;

  document.getElementById('upload-btn-row').innerHTML =
    '<button onclick="closeUpload()">Schließen</button>' +
    '<button onclick="skipFlyerEvent()">→ Überspringen</button>' +
    '<button class="primary" id="btn-upload-submit" onclick="submitFlyerUpload()">↑ In App speichern</button>';

  document.getElementById('modal-upload').style.display = 'flex';
  initUploadAutocomplete();
}

function skipFlyerEvent() {
  flyerEvents[flyerUploadIndex].status = "übersprungen";
  updateFlyerList();
  const nextIdx = flyerEvents.findIndex((e, i) => i > flyerUploadIndex && e.status === "offen");
  if (nextIdx >= 0) { openFlyerUpload(nextIdx); return; }
  const anyOffen = flyerEvents.findIndex(e => e.status === "offen");
  if (anyOffen >= 0) { openFlyerUpload(anyOffen); return; }
  showFlyerCompletion();
}

function submitFlyerUpload() {
  if (!uploadData.name || !uploadData.standort) { alert('Name und Standort sind Pflichtfelder.'); return; }
  if (!uploadData.datum) { alert('Bitte ein Datum eingeben.'); return; }
  const uhr = uploadData.uhrzeit || '20:00';
  const btn = document.getElementById('btn-upload-submit');
  btn.disabled = true; btn.textContent = '⏳ Speichert…';

  // Ausstehend: Event landet in der Recherche-Liste, nicht in der App
  if (uploadData.infoAusstehend) {
    const yr = getYear(uploadData.datum);
    db.collection('pending_events').add({
      name: uploadData.name,
      datum: uploadData.datum,
      uhrzeit: uhr,
      gemeinde: uploadData.standort,
      bezirk: uploadData.bezirk || '',
      adresse: uploadData.adresse || uploadData.standort || '',
      typ: normalizeTyp(uploadData.typ),
      eintritt: uploadData.eintritt || '',
      beschreibung: uploadData.beschreibung || '',
      quelleTyp: 'flyer',
      quelleLink: uploadData.quelleLink || '',
      quellen: uploadData.quellen || [],
      srcZitat: '',
      sicherheit: 'mittel',
      latitude: uploadData.latitude || null,
      longitude: uploadData.longitude || null,
      status: yr >= 2026 ? 'confirmed' : 'check',
      geprueft: false,
      inApp: false,
      infoAusstehend: true,
      notiz: uploadData.notiz || '',
      mgrSrcIgAccount: uploadData.igUsername || '',
      linkedIgAccount: uploadData.igUsername || '',
      createdAt: firebase.firestore.FieldValue.serverTimestamp()
    }).then(() => {
      flyerEvents[flyerUploadIndex].status = "ausstehend";
      updateFlyerList();
      showToast('⏳ ' + uploadData.name + ' → Recherche-Liste');
      const nextIdx = flyerEvents.findIndex((e, i) => i > flyerUploadIndex && e.status === "offen");
      if (nextIdx >= 0) { openFlyerUpload(nextIdx); return; }
      const anyOffen = flyerEvents.findIndex(e => e.status === "offen");
      if (anyOffen >= 0) { openFlyerUpload(anyOffen); return; }
      showFlyerCompletion();
    }).catch(e => {
      btn.disabled = false; btn.textContent = '⏳ In Recherche speichern';
      alert('Fehler: ' + e.message);
    });
    return;
  }

  const datumISO = `${uploadData.datum}T${uhr}:00.000Z`;
  const eintrittText = uploadData.eintritt.trim();
  const beschreibungText = uploadData.beschreibung.trim();
  const _flyerParts = [];
  if (eintrittText) {
    const _eLines = eintrittText.split('\n').map(l => l.trim()).filter(Boolean);
    _flyerParts.push('Eintritt:\n' + _eLines.map(l => /€/.test(l) ? l : l + ' €').join('\n'));
  }
  _flyerParts.push('Einlass ab ' + uhr + ' Uhr');
  if (beschreibungText) _flyerParts.push(beschreibungText);
  const combinedBeschreibung = _flyerParts.join('\n\n');

  const _flyerRef = db.collection('events').doc();
  _flyerRef.set({
    name: uploadData.name, datum: datumISO, uhrzeit: uhr,
    standort: uploadData.standort, gemeinde: uploadData.standort,
    adresse: uploadData.adresse || uploadData.standort || '', bezirk: uploadData.bezirk || '',
    beschreibung: combinedBeschreibung, eintritt: uploadData.eintritt || '',
    typ: normalizeTyp(uploadData.typ), latitude: uploadData.latitude || null, longitude: uploadData.longitude || null,
    mgrSrcQuelleTyp: 'flyer', mgrSrcQuelleLink: uploadData.quelleLink || '', mgrSrcIgAccount: uploadData.igUsername || '',
    id: _flyerRef.id, createdAt: firebase.firestore.FieldValue.serverTimestamp(),
  }).then(() => {
    flyerEvents[flyerUploadIndex].status = "hochgeladen";
    updateFlyerList();
    showToast('✓ ' + uploadData.name + ' in App gespeichert');
    const nextIdx = flyerEvents.findIndex((e, i) => i > flyerUploadIndex && e.status === "offen");
    if (nextIdx >= 0) { openFlyerUpload(nextIdx); return; }
    const anyOffen = flyerEvents.findIndex(e => e.status === "offen");
    if (anyOffen >= 0) { openFlyerUpload(anyOffen); return; }
    showFlyerCompletion();
  }).catch(e => {
    btn.disabled = false; btn.textContent = '↑ In App speichern';
    alert('Fehler: ' + e.message);
  });
}

function showFlyerCompletion() {
  const hochgeladen = flyerEvents.filter(e => e.status === "hochgeladen").length;
  const ausstehend = flyerEvents.filter(e => e.status === "ausstehend").length;
  const uebersprungen = flyerEvents.filter(e => e.status === "übersprungen").length;
  document.getElementById('upload-modal-title').textContent = 'Flyer-Import abgeschlossen';
  document.getElementById('upload-form-content').innerHTML = `
    <div style="text-align:center;padding:2rem 1rem">
      <div style="font-size:40px;margin-bottom:1rem">✅</div>
      <div style="font-size:16px;font-weight:700;margin-bottom:10px">Alle Events verarbeitet</div>
      <div style="font-size:13px;color:#888;line-height:2">
        ${hochgeladen > 0 ? `<span style="color:#27AE60;font-weight:600">${hochgeladen} hochgeladen</span>` : ""}
        ${ausstehend > 0 ? `${hochgeladen > 0 ? " · " : ""}<span style="color:#D98D00;font-weight:600">⏳ ${ausstehend} in Recherche</span>` : ""}
        ${uebersprungen > 0 ? `${hochgeladen > 0 || ausstehend > 0 ? " · " : ""}<span style="color:#bbb">${uebersprungen} übersprungen</span>` : ""}
      </div>
    </div>`;
  document.getElementById('upload-btn-row').innerHTML =
    '<button class="primary" style="flex:1" onclick="closeUpload()">Schließen</button>';
}

// ---- UPLOAD MODAL ----

  isFlyerMode = false;
  const ev = pending.find(e => e._id === id);
  if (!ev) return;
  uploadPendingId = id;
  const d = parseDatum(ev.datum);
  const datumISO = d
    ? `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`
    : '';
  const uhr = ev.uhrzeit === 'ganztags' ? '20:00' : (ev.uhrzeit || '20:00');
  uploadData = {
    name: ev.name || '',
    datum: datumISO,
    uhrzeit: uhr,
    standort: ev.gemeinde || '',
    adresse: ev.adresse || '',
    bezirk: ev.bezirk || '',
    typ: normalizeTyp(ev.typ),
    eintritt: (ev.eintritt === 'k.A.' ? '' : ev.eintritt) || '',
    beschreibung: ev.beschreibung || '',
    latitude: ev.latitude ?? ev.lat ?? null,

// Allgemeine Koordinaten-Eingabe: setzt lat/lng in dataObj, zeigt Koordinaten an
// adresseInputId (optional): wenn angegeben, wird per Reverse Geocoding eine Adresse vorgeschlagen
function handleCoordsInput(val, dataObj, coordsDisplayId, coordsTextId, warnId, adresseInputId) {
  const m = val.trim().match(/^(-?\d+\.?\d*)[,\s]+(-?\d+\.?\d*)$/);
  if (!m) return;
  dataObj.latitude = parseFloat(m[1]);
  dataObj.longitude = parseFloat(m[2]);
  const el = document.getElementById(coordsDisplayId);
  if (el) el.style.display = 'block';
  const txt = document.getElementById(coordsTextId);
  if (txt) txt.textContent = `${dataObj.latitude.toFixed(5)}, ${dataObj.longitude.toFixed(5)}`;
  const warn = document.getElementById(warnId);
  if (warn) warn.style.display = 'none';
  if (adresseInputId && window.google && google.maps) {
    const geocoder = new google.maps.Geocoder();
    geocoder.geocode({ location: { lat: dataObj.latitude, lng: dataObj.longitude } }, (results, status) => {
      if (status === 'OK' && results[0]) {
        dataObj.adresse = results[0].formatted_address;
        const inp = document.getElementById(adresseInputId);
        if (inp && !inp.value) inp.value = results[0].formatted_address;
      }
    });
  }
}

// Allgemeines Autocomplete-Setup — Places API (New), custom dropdown
async function setupAutocomplete(inputId, dataObj, coordsDisplayId, coordsTextId, warnId) {
  const input = document.getElementById(inputId);
  if (!input || !window.google || !google.maps) return;
  if (input._acSetup) return;
  input._acSetup = true;

  let AutocompleteSuggestion;
  try {
    ({ AutocompleteSuggestion } = await google.maps.importLibrary('places'));
  } catch(e) {
    _showMapsStatus('✗ Places API nicht verfügbar: ' + e.message, 'red');
    return;
  }

  const wrap = input.parentNode;
  wrap.style.position = 'relative';
  const drop = document.createElement('div');
  drop.style.cssText = [
    'position:absolute','top:100%','left:0','right:0','z-index:9999',
    'background:var(--surface)','border:1px solid var(--border)',
    'border-radius:8px','box-shadow:0 6px 20px rgba(0,0,0,.18)',
    'max-height:220px','overflow-y:auto','display:none','margin-top:2px'
  ].join(';');
  wrap.appendChild(drop);

  async function selectSuggestion(suggestion) {
    drop.style.display = 'none';
    input.value = suggestion.placePrediction.text.text;
    try {
      const place = suggestion.placePrediction.toPlace();
      await place.fetchFields({ fields: ['formattedAddress', 'location'] });
      dataObj.latitude = place.location.lat();
      dataObj.longitude = place.location.lng();
      dataObj.adresse = place.formattedAddress;
      input.value = place.formattedAddress;
      const el = document.getElementById(coordsDisplayId);
      if (el) el.style.display = 'block';
      const txt = document.getElementById(coordsTextId);
      if (txt) txt.textContent = `${dataObj.latitude.toFixed(5)}, ${dataObj.longitude.toFixed(5)}`;
      const warn = document.getElementById(warnId);
      if (warn) warn.style.display = 'none';
    } catch(e) { console.error('place details error', e); }
  }

  let timer;
  input.addEventListener('input', () => {
    clearTimeout(timer);
    const val = input.value.trim();
    if (val.length < 2) { drop.style.display = 'none'; return; }
    drop.innerHTML = `<div style="padding:10px 14px;font-size:12px;color:var(--text-2)">⏳ Suche…</div>`;
    drop.style.display = 'block';
    timer = setTimeout(async () => {
      try {
        const { suggestions } = await AutocompleteSuggestion.fetchAutocompleteSuggestions({
          input: val, includedRegionCodes: ['at']
        });
        drop.innerHTML = '';
        if (!suggestions || suggestions.length === 0) {
          drop.innerHTML = `<div style="padding:10px 14px;font-size:12px;color:var(--text-3)">Keine Ergebnisse</div>`;
          return;
        }
        suggestions.forEach(s => {
          const item = document.createElement('div');
          item.textContent = s.placePrediction.text.text;
          item.style.cssText = 'padding:11px 14px;cursor:pointer;font-size:13px;border-bottom:1px solid var(--border-sub);color:var(--text)';
          item.addEventListener('mouseover', () => item.style.background = 'var(--surface-2)');
          item.addEventListener('mouseout',  () => item.style.background = '');
          item.addEventListener('pointerdown', e => { e.preventDefault(); selectSuggestion(s); });
          drop.appendChild(item);
        });
        drop.style.display = 'block';
      } catch(e) {
        drop.innerHTML = `<div style="padding:10px 14px;font-size:12px;color:var(--red)">Fehler: ${e.message}</div>`;
        drop.style.display = 'block';
      }
    }, 300);
  });

  input.addEventListener('blur', () => setTimeout(() => { drop.style.display = 'none'; }, 150));
  input.addEventListener('focus', () => { if (input.value.trim().length >= 2) input.dispatchEvent(new Event('input')); });
}

function parseCoordsInput(val) {

function submitUpload() {
  if (!uploadData.name || !uploadData.standort) { alert('Name und Standort sind Pflichtfelder.'); return; }
  if (!uploadData.datum) { alert('Bitte ein Datum eingeben.'); return; }
  const uhr = uploadData.uhrzeit || '20:00';
  const btn = document.getElementById('btn-upload-submit');
  btn.disabled = true;
  btn.textContent = '⏳ Speichert…';

  // Ausstehend: nur pending_event aktualisieren, nichts in App hochladen
  if (uploadData.infoAusstehend && uploadPendingId) {
    const ev = pending.find(e => e._id === uploadPendingId);
    const existingQuellen = ev ? (ev.quellen || []) : [];
    const newQuellen = uploadData.quellen && uploadData.quellen.length
      ? [...existingQuellen, ...uploadData.quellen.filter(q => !existingQuellen.includes(q))]
      : existingQuellen;
    db.collection('pending_events').doc(uploadPendingId).update({
      infoAusstehend: true,
      notiz: uploadData.notiz || (ev ? ev.notiz || '' : ''),
      ...(newQuellen.length ? { quellen: newQuellen } : {})
    }).then(() => { closeUpload(); showToast('⏳ Als ausstehend markiert'); })
      .catch(e => { btn.disabled = false; btn.textContent = '↑ In App speichern'; alert('Fehler: ' + e.message); });
    return;
  }

  const datumISO = `${uploadData.datum}T${uhr}:00.000Z`;
  const eintrittText = uploadData.eintritt.trim();
  const beschreibungText = uploadData.beschreibung.trim();
  const _uploadParts = [];
  if (eintrittText) {
    const _eLines = eintrittText.split('\n').map(l => l.trim()).filter(Boolean);
    _uploadParts.push('Eintritt:\n' + _eLines.map(l => /€/.test(l) ? l : l + ' €').join('\n'));
  }
  _uploadParts.push('Einlass ab ' + uhr + ' Uhr');
  if (beschreibungText) _uploadParts.push(beschreibungText);
  const combinedBeschreibung = _uploadParts.join('\n\n');

  const _uploadRef = db.collection('events').doc();
  _uploadRef.set({
    name: uploadData.name,
    datum: datumISO,
    uhrzeit: uhr,
    standort: uploadData.standort,
    gemeinde: uploadData.standort,
    adresse: uploadData.adresse || uploadData.standort || '',
    bezirk: uploadData.bezirk || '',
    beschreibung: combinedBeschreibung,
    eintritt: uploadData.eintritt || '',
    typ: normalizeTyp(uploadData.typ),
    latitude: uploadData.latitude || null,
    longitude: uploadData.longitude || null,
    mgrSrcQuelleTyp: uploadData.quelleTyp || '', mgrSrcQuelleLink: uploadData.quelleLink || '', mgrSrcIgAccount: '',
    id: _uploadRef.id,
    createdAt: firebase.firestore.FieldValue.serverTimestamp(),
  }).then(() => db.collection('pending_events').doc(uploadPendingId).update({ inApp: true }))
    .then(() => { closeUpload(); showToast('✓ ' + uploadData.name + ' in App gespeichert'); })
    .catch(e => {
      btn.disabled = false;
      btn.textContent = '↑ In App speichern';
      alert('Fehler: ' + e.message);
    });
}

function esc(s){if(!s)return"";return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");}

// ---- MULTI-CONFIRM + GEMEINDE HELPERS ----
function computeMultiConfirmed() {
  multiConfirmedIds = new Set();
  const groups = {};
  for (const ev of pending) {
    if (!ev.quelleTyp) continue;
    const key = normalizeName(ev.name) + '|' + getYear(ev.datum);
    if (!groups[key]) groups[key] = {};
    if (!groups[key][ev.quelleTyp]) groups[key][ev.quelleTyp] = [];
    groups[key][ev.quelleTyp].push(ev._id);
  }
  for (const group of Object.values(groups)) {
    if (Object.keys(group).length > 1) {
      for (const ids of Object.values(group)) {
        for (const id of ids) multiConfirmedIds.add(id);
      }
    }
  }
}

function deriveBezirkFromGemeinde(gem) {
  if (!gem) return "";
  const g = gem.trim();
  const entry = Object.entries(GEMEINDEN).find(([bez, gems]) => gems.includes(g));
  return entry ? entry[0] : "";
}
