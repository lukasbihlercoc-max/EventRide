const IG_STATUS_LIST = [
  ["offen","Offen"],
  ["geprueft_kein_termin","Geprüft – kein Termin"],
  ["termin_gefunden","Termin gefunden"],
  ["nicht_relevant","Nicht relevant"]
];
const IG_STATUS_BADGE = {
  "offen":"ig-offen",
  "geprueft_kein_termin":"ig-geprueft",
  "termin_gefunden":"ig-termin",
  "nicht_relevant":"ig-irrelevant"
};

function toggleIgExpand(id) {
  if (expandedIgIds.has(id)) expandedIgIds.delete(id);
  else expandedIgIds.add(id);
  renderAccounts();
}

function matchedAppEvents(acc) {
  const gem = (acc.gemeinde || '').toLowerCase().trim();
  if (!gem) return [];
  return appEvents.filter(ev => {
    if (acc.username && ev.mgrSrcIgAccount === acc.username) return true;
    if ((ev.gemeinde || '').toLowerCase() === gem) return true;
    if (gem.length >= 4 && (ev.name || '').toLowerCase().includes(gem)) return true;
    return false;
  });
}

function renderAccounts() {
  let accs = [...igAccounts];
  if(igFilterStatus!=="Alle") accs=accs.filter(a=>a.status===igFilterStatus);
  if(igFilterTyp!=="Alle") accs=accs.filter(a=>a.vereinsTyp===igFilterTyp);
  if(igFilterBezirk!=="Alle") accs=accs.filter(a=>a.bezirk===igFilterBezirk);
  if(igFilterKI) accs=accs.filter(a=>a.kiRecherche===true&&!a.manuellKontrolliert);
  if(igSearch){const q=igSearch.toLowerCase();accs=accs.filter(a=>(a.username||"").toLowerCase().includes(q)||(a.displayName||"").toLowerCase().includes(q)||(a.gemeinde||"").toLowerCase().includes(q));}

  accs.sort((a,b)=>{
    const va=(a[igSortField]||"").toLowerCase();
    const vb=(b[igSortField]||"").toLowerCase();
    const cmp=va<vb?-1:va>vb?1:0;
    return igSortDir==="asc"?cmp:-cmp;
  });

  const total=igAccounts.length;
  const offen=igAccounts.filter(a=>a.status==="offen").length;
  const geprueft=igAccounts.filter(a=>a.status==="geprueft_kein_termin").length;
  const termin=igAccounts.filter(a=>a.status==="termin_gefunden").length;
  const irrelevant=igAccounts.filter(a=>a.status==="nicht_relevant").length;
  const kiUngeprueft=igAccounts.filter(a=>a.kiRecherche===true&&!a.manuellKontrolliert).length;

  const thSort=(field,label)=>{
    const active=igSortField===field;
    const arrow=active?(igSortDir==="asc"?" ↑":" ↓"):"";
    return `<th onclick="igToggleSort('${field}')" style="${active?"color:var(--text);":""}white-space:nowrap">${label}${arrow}</th>`;
  };

  const statusOpts=(cur)=>IG_STATUS_LIST.map(([v,l])=>`<option value="${v}" ${cur===v?"selected":""}>${l}</option>`).join("");

  // Group by Bezirk
  const bezOrder = BEZIRKE;
  const byBez = {};
  for (const b of bezOrder) byBez[b] = [];
  const unknownBez = [];
  for (const a of accs) {
    if (byBez[a.bezirk]) byBez[a.bezirk].push(a);
    else unknownBez.push(a);
  }

  let tableHtml = "";
  for (const bez of bezOrder) {
    const group = byBez[bez];
    if (!group.length) continue;
    const isOpen = igBezOpen[bez] !== false;
    tableHtml += `<tr class="ig-bez-hdr" onclick="igBezOpen['${bez}']=igBezOpen['${bez}']===false?true:false;renderAccounts()">
      <td colspan="9" style="font-weight:600;font-size:13px;cursor:pointer;user-select:none;padding:8px 12px">
        <span style="margin-right:8px">${isOpen?"▼":"▶"}</span>${bez}
        <span style="font-size:12px;font-weight:400;color:var(--text-3);margin-left:6px">${group.length} Account${group.length!==1?"s":""}</span>
      </td>
    </tr>`;
    if (isOpen) {
      for (const a of group) {
        const terminFarbe=a.status==="termin_gefunden"?"#27AE60":"var(--text-2)";
        const kiDone=a.kiRecherche&&a.manuellKontrolliert;
        tableHtml += `<tr>
          <td><a class="ig-username" href="https://www.instagram.com/${esc(a.username||"")}/" target="_blank" rel="noopener">@${esc(a.username||"")}</a></td>
          <td style="font-weight:500;max-width:160px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${esc(a.displayName||"")}</td>
          <td style="white-space:nowrap"><span class="badge" style="background:var(--surface-2);color:var(--text-2);border-color:var(--border);font-size:11px">${esc(a.vereinsTyp||"")}</span></td>
          <td style="font-size:12px;white-space:nowrap">${esc(a.gemeinde||"")}</td>
          <td>
            <select class="ig-status-select" onchange="setIgStatus('${a._id}',this.value)">${statusOpts(a.status)}</select>
          </td>
          <td style="font-size:12px;color:${terminFarbe};font-weight:${a.status==="termin_gefunden"?"600":"400"};white-space:nowrap">${esc(a.letzterTermin||"—")}</td>
          <td style="max-width:140px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-size:12px;color:var(--text-2)">${esc(a.letzteEventNamen||"")}</td>
          <td style="white-space:nowrap;min-width:80px">
            <label style="display:inline-flex;align-items:center;gap:4px;cursor:pointer;margin-right:6px" title="KI-recherchiert">
              <input type="checkbox" ${a.kiRecherche?"checked":""} onchange="setIgField('${a._id}','kiRecherche',this.checked)" style="width:13px;height:13px;accent-color:var(--accent)">
              <span style="font-size:11px">🤖</span>
            </label>
            <label style="display:inline-flex;align-items:center;gap:4px;cursor:pointer" title="Manuell kontrolliert">
              <input type="checkbox" ${a.manuellKontrolliert?"checked":""} onchange="setIgField('${a._id}','manuellKontrolliert',this.checked)" style="width:13px;height:13px;accent-color:var(--green)">
              <span style="font-size:11px;color:${kiDone?"var(--green)":"var(--text-3)"}">✓</span>
            </label>
          </td>
          <td>
            <div style="display:flex;gap:4px;flex-wrap:nowrap">
              <button class="small" onclick="toggleIgExpand('${a._id}')" title="Events anzeigen" style="${expandedIgIds.has(a._id)?'background:var(--accent);color:#fff;border-color:var(--accent)':''}">${expandedIgIds.has(a._id)?'▲':'▼'}</button>
              <button class="small" onclick="openIgEdit('${a._id}')" title="Bearbeiten">✏</button>
              ${a.status==="termin_gefunden"?`<button class="small primary" style="font-size:11px;padding:3px 8px;white-space:nowrap" onclick="igEventUebernehmen('${a._id}')">→ Event</button>`:""}
              <button class="small danger" onclick="delIgAccount('${a._id}')">🗑</button>
            </div>
          </td>
        </tr>${expandedIgIds.has(a._id)?`<tr><td colspan="9" style="padding:0;background:var(--surface-2);border-bottom:2px solid var(--border)">${(()=>{
          const evs=matchedAppEvents(a);
          if(!evs.length) return '<div style="padding:8px 16px;font-size:12px;color:#999">Keine passenden In-App-Events gefunden.</div>';
          return '<div style="padding:4px 8px">' + evs.map(ev=>`<div style="display:flex;align-items:center;gap:8px;padding:4px 6px;font-size:12px;border-radius:4px">${typBadge(ev.typ)}<span style="flex:1;font-weight:500">${esc(ev.name)}</span><span style="color:#888;white-space:nowrap">${fmt(ev.datum)}</span></div>`).join('') + '</div>';
        })()}</td></tr>`:''}`;
      }
    }
  }
  if (unknownBez.length) {
    tableHtml += `<tr class="ig-bez-hdr"><td colspan="9" style="font-weight:600;font-size:13px;padding:8px 12px">Kein Bezirk <span style="font-size:12px;font-weight:400;color:var(--text-3);margin-left:6px">${unknownBez.length}</span></td></tr>`;
    for (const a of unknownBez) {
      const terminFarbe=a.status==="termin_gefunden"?"#27AE60":"var(--text-2)";
      tableHtml += `<tr>
        <td><a class="ig-username" href="https://www.instagram.com/${esc(a.username||"")}/" target="_blank" rel="noopener">@${esc(a.username||"")}</a></td>
        <td>${esc(a.displayName||"")}</td>
        <td>${esc(a.vereinsTyp||"")}</td>
        <td>${esc(a.gemeinde||"")}</td>
        <td><select class="ig-status-select" onchange="setIgStatus('${a._id}',this.value)">${statusOpts(a.status)}</select></td>
        <td style="font-size:12px;color:${terminFarbe}">${esc(a.letzterTermin||"—")}</td>
        <td style="font-size:12px;color:var(--text-2)">${esc(a.letzteEventNamen||"")}</td>
        <td></td>
        <td>
          <div style="display:flex;gap:4px;flex-wrap:nowrap">
            <button class="small" onclick="toggleIgExpand('${a._id}')" style="${expandedIgIds.has(a._id)?'background:var(--accent);color:#fff;border-color:var(--accent)':''}">${expandedIgIds.has(a._id)?'▲':'▼'}</button>
            <button class="small" onclick="openIgEdit('${a._id}')">✏</button>
            <button class="small danger" onclick="delIgAccount('${a._id}')">🗑</button>
          </div>
        </td>
      </tr>${expandedIgIds.has(a._id)?`<tr><td colspan="9" style="padding:0;background:var(--surface-2);border-bottom:2px solid var(--border)">${(()=>{
        const evs=matchedAppEvents(a);
        if(!evs.length) return '<div style="padding:8px 16px;font-size:12px;color:#999">Keine passenden In-App-Events gefunden.</div>';
        return '<div style="padding:4px 8px">'+evs.map(ev=>`<div style="display:flex;align-items:center;gap:8px;padding:4px 6px;font-size:12px;border-radius:4px">${typBadge(ev.typ)}<span style="flex:1;font-weight:500">${esc(ev.name)}</span><span style="color:#888;white-space:nowrap">${fmt(ev.datum)}</span></div>`).join('')+'</div>';
      })()}</td></tr>`:''}`;
    }
  }
  if (!tableHtml) {
    tableHtml = `<tr><td colspan="9" style="text-align:center;padding:4rem;color:var(--text-3)">Keine Accounts gefunden.</td></tr>`;
  }

  const hasFilter=igFilterStatus!=="Alle"||igFilterTyp!=="Alle"||igFilterBezirk!=="Alle"||igSearch||igFilterKI;

  document.getElementById("content").innerHTML = `
    <div style="display:flex;gap:10px;flex-wrap:wrap;margin-bottom:1.5rem;align-items:stretch">
      <div class="ig-stat-chip" style="border-color:var(--border)">
        <div class="ig-stat-num" style="color:var(--accent)">${total}</div>
        <div class="ig-stat-lbl">Gesamt</div>
      </div>
      <div class="ig-stat-chip" style="background:rgba(245,160,74,.08);border-color:rgba(245,160,74,.22)">
        <div class="ig-stat-num" style="color:#B45309">${offen}</div>
        <div class="ig-stat-lbl" style="color:#B45309">Offen</div>
      </div>
      <div class="ig-stat-chip" style="background:rgba(26,127,55,.07);border-color:rgba(26,127,55,.18)">
        <div class="ig-stat-num" style="color:var(--green)">${termin}</div>
        <div class="ig-stat-lbl" style="color:var(--green-t)">Termin gefunden</div>
      </div>
      <div class="ig-stat-chip">
        <div class="ig-stat-num" style="color:var(--text-2)">${geprueft}</div>
        <div class="ig-stat-lbl">Kein Termin</div>
      </div>
      <div class="ig-stat-chip">
        <div class="ig-stat-num" style="color:var(--text-3)">${irrelevant}</div>
        <div class="ig-stat-lbl">Nicht relevant</div>
      </div>
      ${kiUngeprueft?`<div class="ig-stat-chip" style="background:rgba(9,105,218,.06);border-color:rgba(9,105,218,.18);cursor:pointer" onclick="igFilterKI=!igFilterKI;renderAccounts()" title="KI-ungeprüft anzeigen">
        <div class="ig-stat-num" style="color:var(--blue-t)">${kiUngeprueft}</div>
        <div class="ig-stat-lbl" style="color:var(--blue-t)">🤖 KI-ungeprüft</div>
      </div>`:""}
    </div>

    <div class="filter-bar" style="margin-bottom:14px">
      <input type="text" placeholder="Username / Name / Ort…" value="${esc(igSearch)}" oninput="igSearch=this.value;renderAccounts()" style="width:200px">
      <select onchange="igFilterStatus=this.value;renderAccounts()">
        <option value="Alle" ${igFilterStatus==="Alle"?"selected":""}>Alle Status</option>
        ${IG_STATUS_LIST.map(([v,l])=>`<option value="${v}" ${igFilterStatus===v?"selected":""}>${l}</option>`).join("")}
      </select>
      <select onchange="igFilterTyp=this.value;renderAccounts()">
        <option value="Alle" ${igFilterTyp==="Alle"?"selected":""}>Alle Typen</option>
        ${IG_TYPEN.map(t=>`<option value="${t}" ${igFilterTyp===t?"selected":""}>${t}</option>`).join("")}
      </select>
      <select onchange="igFilterBezirk=this.value;renderAccounts()">
        <option value="Alle" ${igFilterBezirk==="Alle"?"selected":""}>Alle Bezirke</option>
        ${BEZIRKE.map(b=>`<option value="${b}" ${igFilterBezirk===b?"selected":""}>${b}</option>`).join("")}
      </select>
      <label style="display:inline-flex;align-items:center;gap:5px;cursor:pointer;font-size:12px;white-space:nowrap;color:${igFilterKI?"var(--blue-t)":"var(--text-2)"}">
        <input type="checkbox" ${igFilterKI?"checked":""} onchange="igFilterKI=this.checked;renderAccounts()" style="accent-color:var(--accent)">
        🤖 KI-ungeprüft
      </label>
      ${hasFilter?`<button class="small danger" onclick="igFilterStatus='Alle';igFilterTyp='Alle';igFilterBezirk='Alle';igSearch='';igFilterKI=false;renderAccounts()">✕ Filter</button>`:""}
      <span class="filter-count">${accs.length} von ${total}</span>
      <div style="margin-left:auto;display:flex;gap:8px">
        <button class="small" onclick="igToggleImport()">📂 CSV Import</button>
        <button class="small" onclick="exportIgCSV()">📥 CSV exportieren</button>
        <button class="primary small" onclick="openIgAdd()">＋ Account</button>
      </div>
    </div>

    <div class="ig-table-wrap">
      <table class="ig-table">
        <thead>
          <tr>
            ${thSort("username","Username")}
            ${thSort("displayName","Anzeigename")}
            ${thSort("vereinsTyp","Typ")}
            ${thSort("gemeinde","Ort")}
            ${thSort("status","Status")}
            ${thSort("letzterTermin","Termin")}
            <th>Event-Name</th>
            <th style="white-space:nowrap">🤖 / ✓</th>
            <th style="width:1%">Aktionen</th>
          </tr>
        </thead>
        <tbody>${tableHtml}</tbody>
      </table>
    </div>

    <div id="ig-csv-import-section" style="display:${igShowImport?"block":"none"};margin-top:1.5rem">
      <div class="card" style="padding:1.5rem">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:.75rem">
          <h3 style="font-size:14px;font-weight:700;margin:0">CSV Import – IG Accounts</h3>
          <button class="icon-btn" onclick="igShowImport=false;document.getElementById('ig-csv-import-section').style.display='none'">×</button>
        </div>
        <div style="background:var(--surface-2);border-radius:var(--rx);padding:8px 12px;font-family:monospace;font-size:11px;color:var(--text-3);margin-bottom:.75rem;line-height:1.8">
          username,displayName,vereinsTyp,gemeinde,bezirk,status,letzterTermin,letzteEventNamen,quelle,zuletztGeprueftAm,notizen,kiRecherche,manuellKontrolliert
        </div>
        <p style="font-size:12px;color:var(--text-3);margin-bottom:.75rem;line-height:1.6">Duplikat-Check über <strong>username</strong> — vorhandene Einträge werden <strong>aktualisiert</strong> (Upsert). Leeres <code>bezirk</code>-Feld wird automatisch aus <code>gemeinde</code> abgeleitet. Fehlende <code>kiRecherche</code>-Spalte → <strong>true</strong>.</p>
        <textarea id="ig-csv-input" rows="8" placeholder="CSV hier einfügen…" style="font-family:monospace;font-size:12px;margin-bottom:.75rem"></textarea>
        <div style="display:flex;gap:8px;align-items:center">
          <button class="primary" onclick="importIgCSV()">↑ Importieren</button>
          <span id="ig-csv-msg" style="font-size:13px"></span>
        </div>
      </div>
    </div>
  `;
}

function igToggleSort(field) {
  if(igSortField===field) igSortDir=igSortDir==="asc"?"desc":"asc";
  else{igSortField=field;igSortDir="asc";}
  renderAccounts();
}

function igToggleImport() {
  igShowImport=!igShowImport;
  const sec=document.getElementById("ig-csv-import-section");
  if(sec) sec.style.display=igShowImport?"block":"none";
}

function setIgStatus(id,status) {
  db.collection("ig_accounts").doc(id).update({status}).catch(e=>console.error(e));
}

function igFormHTML() {
  const d=igEditData;
  const statusOpts=IG_STATUS_LIST.map(([v,l])=>`<option value="${v}" ${d.status===v?"selected":""}>${l}</option>`).join("");
  const typOpts=IG_TYPEN.map(t=>`<option value="${t}" ${d.vereinsTyp===t?"selected":""}>${t}</option>`).join("");
  const bezOpts=BEZIRKE.map(b=>`<option value="${b}" ${d.bezirk===b?"selected":""}>${b}</option>`).join("");
  return `<div class="edit-grid">
    <span class="edit-label">Username *</span>
    <input value="${esc(d.username||"")}" placeholder="zechburschen_kaning (ohne @)" oninput="igEditData.username=this.value.replace(/^@/,'').trim()">
    <span class="edit-label">Anzeigename</span>
    <input value="${esc(d.displayName||"")}" placeholder="Zechburschen Kaning" oninput="igEditData.displayName=this.value">
    <span class="edit-label">Typ</span>
    <select onchange="igEditData.vereinsTyp=this.value">${typOpts}</select>
    <span class="edit-label">Gemeinde</span>
    <input value="${esc(d.gemeinde||"")}" placeholder="z.B. Kaning" oninput="igEditData.gemeinde=this.value">
    <span class="edit-label">Bezirk</span>
    <select onchange="igEditData.bezirk=this.value">
      <option value="" ${!d.bezirk?"selected":""}>–</option>
      ${bezOpts}
    </select>
    <span class="edit-label">Status</span>
    <select onchange="igEditData.status=this.value">${statusOpts}</select>
    <span class="edit-label">Letzter Termin</span>
    <input value="${esc(d.letzterTermin||"")}" placeholder="16.08.2026" oninput="igEditData.letzterTermin=this.value">
    <span class="edit-label">Event-Name</span>
    <input value="${esc(d.letzteEventNamen||"")}" placeholder="Pöllaner Kirchtag" oninput="igEditData.letzteEventNamen=this.value">
    <span class="edit-label">Quelle</span>
    <textarea rows="2" oninput="igEditData.quelle=this.value" style="font-size:12px;padding:7px 10px">${esc(d.quelle||"")}</textarea>
    <span class="edit-label">Geprüft am</span>
    <input value="${esc(d.zuletztGeprueftAm||"")}" placeholder="17.06.2026" oninput="igEditData.zuletztGeprueftAm=this.value">
    <span class="edit-label">Notizen</span>
    <textarea rows="2" oninput="igEditData.notizen=this.value" style="font-size:12px;padding:7px 10px">${esc(d.notizen||"")}</textarea>
    <span class="edit-label">KI-recherchiert</span>
    <label style="display:flex;align-items:center;gap:8px;cursor:pointer;font-size:13px">
      <input type="checkbox" ${d.kiRecherche?"checked":""} onchange="igEditData.kiRecherche=this.checked" style="width:15px;height:15px;accent-color:var(--accent)">
      🤖 Mit KI oder Browser-Extension recherchiert
    </label>
    <span class="edit-label">Manuell kontrolliert</span>
    <label style="display:flex;align-items:center;gap:8px;cursor:pointer;font-size:13px">
      <input type="checkbox" ${d.manuellKontrolliert?"checked":""} onchange="igEditData.manuellKontrolliert=this.checked" style="width:15px;height:15px;accent-color:var(--green)">
      ✓ Manuell geprüft und bestätigt
    </label>
  </div>`;
}

function openIgAdd() {
  igEditId=null;
  igEditData={username:"",displayName:"",vereinsTyp:"Zechgemeinschaft",gemeinde:"",bezirk:"",status:"offen",letzterTermin:"",letzteEventNamen:"",quelle:"",zuletztGeprueftAm:"",notizen:"",kiRecherche:false,manuellKontrolliert:false};
  document.getElementById("ig-modal-title").textContent="Account hinzufügen";
  document.getElementById("ig-modal-body").innerHTML=igFormHTML();
  document.getElementById("modal-ig-account").style.display="flex";
}

function openIgEdit(id) {
  const acc=igAccounts.find(a=>a._id===id);
  if(!acc) return;
  igEditId=id;
  igEditData={...acc};
  document.getElementById("ig-modal-title").textContent="@"+(acc.username||"")+" bearbeiten";
  document.getElementById("ig-modal-body").innerHTML=igFormHTML();
  document.getElementById("modal-ig-account").style.display="flex";
}

function closeIgModal() {
  document.getElementById("modal-ig-account").style.display="none";
}

function saveIgAccount() {
  if(!igEditData.username){alert("Username ist Pflicht.");return;}
  const data={
    username:(igEditData.username||"").replace(/^@/,"").trim(),
    displayName:igEditData.displayName||"",
    vereinsTyp:igEditData.vereinsTyp||"Sonstige",
    gemeinde:igEditData.gemeinde||"",
    bezirk:igEditData.bezirk||"",
    status:igEditData.status||"offen",
    letzterTermin:igEditData.letzterTermin||"",
    letzteEventNamen:igEditData.letzteEventNamen||"",
    quelle:igEditData.quelle||"",
    zuletztGeprueftAm:igEditData.zuletztGeprueftAm||"",
    notizen:igEditData.notizen||"",
    kiRecherche:!!igEditData.kiRecherche,
    manuellKontrolliert:!!igEditData.manuellKontrolliert
  };
  if(igEditId) {
    db.collection("ig_accounts").doc(igEditId).update(data)
      .then(()=>{closeIgModal();showToast("✓ Account gespeichert");})
      .catch(e=>alert("Fehler: "+e.message));
  } else {
    if(igAccounts.some(a=>a.username===data.username)){
      if(!confirm(`@${data.username} existiert bereits. Trotzdem hinzufügen?`)) return;
    }
    db.collection("ig_accounts").add({...data,createdAt:firebase.firestore.FieldValue.serverTimestamp()})
      .then(()=>{closeIgModal();showToast("✓ Account hinzugefügt");})
      .catch(e=>alert("Fehler: "+e.message));
  }
}

function delIgAccount(id) {
  const acc=igAccounts.find(a=>a._id===id);
  if(!acc) return;
  if(!confirm(`@${acc.username} löschen?`)) return;
  db.collection("ig_accounts").doc(id).delete()
    .then(()=>showToast("🗑 Gelöscht"))
    .catch(e=>alert("Fehler: "+e.message));
}

function exportIgCSV() {
  const headers=["username","displayName","vereinsTyp","gemeinde","bezirk","status","letzterTermin","letzteEventNamen","quelle","zuletztGeprueftAm","notizen","kiRecherche","manuellKontrolliert"];
  const escape=v=>{
    if(typeof v==="boolean") return v?"true":"false";
    const s=String(v||"").replace(/"/g,'""');
    return(s.includes(",")||s.includes("\n")||s.includes('"'))?`"${s}"`:s;
  };
  const rows=igAccounts.map(a=>headers.map(h=>{
    if(h==="kiRecherche"||h==="manuellKontrolliert") return escape(!!a[h]);
    return escape(a[h]||"");
  }).join(","));
  const csv=[headers.join(","),...rows].join("\n");
  const blob=new Blob(["﻿"+csv],{type:"text/csv;charset=utf-8;"});
  const url=URL.createObjectURL(blob);
  const a=document.createElement("a");
  const today=new Date();
  const ds=`${today.getFullYear()}-${String(today.getMonth()+1).padStart(2,"0")}-${String(today.getDate()).padStart(2,"0")}`;
  a.href=url;a.download=`ig_accounts_export_${ds}.csv`;
  document.body.appendChild(a);a.click();document.body.removeChild(a);
  URL.revokeObjectURL(url);
  showToast(`✓ ${igAccounts.length} Accounts exportiert`);
}

function importIgCSV() {
  const text=(document.getElementById("ig-csv-input").value||"").trim();
  const lines=text.split("\n").filter(l=>l.trim());
  if(lines.length<2){igCsvMsg("Mind. Header + 1 Zeile nötig.","var(--red)");return;}

  const sep=lines[0].includes(";")?";":","
  const hdrs=splitCSVLine(lines[0],sep).map(h=>h.toLowerCase().trim());
  const exactIdx=name=>hdrs.findIndex(h=>h===name.toLowerCase());
  const iU=exactIdx("username");
  const iDN=exactIdx("displayname");
  const iT=exactIdx("vereinstyp");
  const iG=exactIdx("gemeinde");
  const iB=exactIdx("bezirk");
  const iS=exactIdx("status");
  const iLT=hdrs.findIndex(h=>h==="letzttermin"||h==="letztertermin"||h.includes("letzterterm"));
  const iLN=hdrs.findIndex(h=>h==="letzteeventnamen"||h.includes("letzteevent"));
  const iQ=exactIdx("quelle");
  const iZG=hdrs.findIndex(h=>h==="zuletztgeprueftam"||h.includes("zuletzt"));
  const iN=exactIdx("notizen");
  const iKI=hdrs.findIndex(h=>h==="kirecherche"||h==="ki_recherche"||h.includes("kirecherche"));
  const iMK=hdrs.findIndex(h=>h==="manuellkontrolliert"||h.includes("manuell"));

  if(iU<0){igCsvMsg("Spalte 'username' fehlt.","var(--red)");return;}

  const VALID_STATUS=new Set(["offen","geprueft_kein_termin","termin_gefunden","nicht_relevant"]);
  let added=0,updated=0,skipped=0;
  const batch=db.batch();
  const usernameToDoc={};
  igAccounts.forEach(a=>{ usernameToDoc[a.username]=a._id; });
  const processedInBatch=new Set();

  for(let i=1;i<lines.length;i++){
    const c=splitCSVLine(lines[i],sep);
    const username=(c[iU]||"").trim().replace(/^@/,"");
    if(!username) continue;
    if(processedInBatch.has(username)){skipped++;continue;}
    processedInBatch.add(username);

    const gemeindeVal=iG>=0?(c[iG]||"").trim():"";
    let bezirkVal=iB>=0?(c[iB]||"").trim():"";
    if(!bezirkVal && gemeindeVal) bezirkVal=deriveBezirkFromGemeinde(gemeindeVal);

    const status=iS>=0&&VALID_STATUS.has((c[iS]||"").trim())?(c[iS]||"").trim():"offen";
    const data={
      username,
      displayName:iDN>=0?(c[iDN]||"").trim():"",
      vereinsTyp:iT>=0&&IG_TYPEN.includes((c[iT]||"").trim())?(c[iT]||"").trim():"Sonstige",
      gemeinde:gemeindeVal,
      bezirk:bezirkVal,
      status,
      letzterTermin:iLT>=0?(c[iLT]||"").trim():"",
      letzteEventNamen:iLN>=0?(c[iLN]||"").trim():"",
      quelle:iQ>=0?(c[iQ]||"").trim():"",
      zuletztGeprueftAm:iZG>=0?(c[iZG]||"").trim():"",
      notizen:iN>=0?(c[iN]||"").trim():"",
      kiRecherche: iKI>=0 ? (c[iKI]||"").toLowerCase()==="true" : true,
      manuellKontrolliert: iMK>=0 ? (c[iMK]||"").toLowerCase()==="true" : false,
    };

    const existingId=usernameToDoc[username];
    if(existingId) {
      batch.update(db.collection("ig_accounts").doc(existingId), data);
      updated++;
    } else {
      batch.set(db.collection("ig_accounts").doc(), {...data, createdAt:firebase.firestore.FieldValue.serverTimestamp()});
      added++;
    }
  }

  if(added===0&&updated===0){igCsvMsg(`Keine Änderungen.`,"var(--text-3)");return;}

  igCsvMsg(`Speichere…`,"var(--text-2)");
  batch.commit().then(()=>{
    const el=document.getElementById("ig-csv-input");
    if(el) el.value="";
    igShowImport=false;
    const parts=[];
    if(added) parts.push(`${added} neu`);
    if(updated) parts.push(`${updated} aktualisiert`);
    if(skipped) parts.push(`${skipped} übersprungen`);
    showToast(`✓ IG-Accounts: ${parts.join(" · ")}`);
    igCsvMsg("","");
  }).catch(e=>igCsvMsg("Fehler: "+e.message,"var(--red)"));
}

function igCsvMsg(msg,color) {
  const el=document.getElementById("ig-csv-msg");
  if(el){el.textContent=msg;el.style.color=color||"var(--text)";}
}

function igEventUebernehmen(id) {
  const acc=igAccounts.find(a=>a._id===id);
  if(!acc) return;
  const eventName=acc.letzteEventNamen||acc.displayName||"";
  if(!confirm(`Event "${eventName}" mit Datum ${acc.letzterTermin||"?"} in die Recherche-Liste übernehmen?`)) return;
  const yr=getYear(acc.letzterTermin);
  db.collection("pending_events").add({
    name:eventName,
    datum:acc.letzterTermin||"",
    uhrzeit:"",
    gemeinde:acc.gemeinde||"",
    bezirk:acc.bezirk||"",
    typ:"e1",
    veranstalter:acc.displayName||"",
    eintritt:"",
    beschreibung:"",
    quelle:acc.quelle||"Instagram: @"+(acc.username||""),
    quelle2:"",
    adresse:acc.gemeinde||"",
    latitude:null,longitude:null,
    status:yr>=2026?"confirmed":"check",
    geprueft:false,inApp:false,
    createdAt:firebase.firestore.FieldValue.serverTimestamp()
  }).then(()=>{
    showToast(`✓ "${eventName}" in Recherche übernommen`);
  }).catch(e=>alert("Fehler: "+e.message));
}

// ---- GOOGLE MAPS READY MECHANISM (Places API New) ----
let _gmapsPending = [];
function _onGmapsReady() {
  _gmapsPending.forEach(fn => fn());
  _gmapsPending = [];
  _showMapsStatus('✓ Google Maps geladen', 'green');
}
function _showMapsStatus(msg, color) {
  let el = document.getElementById('_maps-status');
  if (!el) {
    el = document.createElement('div');
    el.id = '_maps-status';
    el.style.cssText = 'position:fixed;bottom:70px;left:50%;transform:translateX(-50%);padding:8px 16px;border-radius:8px;font-size:12px;font-weight:600;color:#fff;z-index:9999;box-shadow:0 2px 8px rgba(0,0,0,.3)';
    document.body.appendChild(el);
  }
  el.textContent = msg;
  el.style.background = color === 'green' ? '#1a7f37' : '#cf222e';
  el.style.display = 'block';
}
setTimeout(() => {
  if (!window.google || !google.maps) {
    _showMapsStatus('✗ Google Maps nicht geladen', 'red');
  }
}, 8000);
function setupAutocompleteWhenReady(inputId, dataObj, coordsDisplayId, coordsTextId, warnId) {
  const run = () => {
    const input = document.getElementById(inputId);
    if (input) setupAutocomplete(inputId, dataObj, coordsDisplayId, coordsTextId, warnId);
  };
  if (window.google && google.maps) run();
  else _gmapsPending.push(run);
}
