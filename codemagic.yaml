workflows:
  ios-release:
    name: iOS Release
    max_build_duration: 60
    environment:
      flutter: stable
      xcode: 16
      cocoapods: default
      groups:
        - firebase_ios
        - app_store_connect
    scripts:
      - name: Flutter & Dart Version pruefen
        script: |
          flutter --version
          dart --version

      - name: Keychain initialisieren
        script: keychain initialize

      - name: Certificate und Profile erstellen
        script: |
          echo $DIST_CERT_KEY | base64 --decode > /tmp/dist_key.pem
          app-store-connect fetch-signing-files \
            at.eventride.app \
            --type IOS_APP_STORE \
            --certificate-key @file:/tmp/dist_key.pem \
            --create

      - name: Certificate zum Keychain hinzufuegen
        script: keychain add-certificates

      - name: Code Signing konfigurieren
        script: xcode-project use-profiles

      - name: GoogleService-Info.plist einspielen
        script: |
          echo $GOOGLESERVICE_INFO_PLIST | base64 --decode \
            > $CM_BUILD_DIR/ios/Runner/GoogleService-Info.plist

      - name: Flutter packages + CocoaPods
        script: |
          flutter config --no-enable-swift-package-manager
          flutter pub get
          rm -rf ios/Pods ios/Podfile.lock
          cd ios && pod install

      - name: Dart Analyse
        script: flutter analyze lib/

      - name: Fix GCC_WARN_INHIBIT_ALL_WARNINGS (BoringSSL-GRPC / Xcode 26)
        script: |
          find "$CM_BUILD_DIR/ios/Pods" -name "*.xcconfig" -print0 | \
            xargs -0 sed -i '' \
              -e 's/GCC_WARN_INHIBIT_ALL_WARNINGS = YES/GCC_WARN_INHIBIT_ALL_WARNINGS = NO/g' \
              -e 's/ -GCC_WARN_INHIBIT_ALL_WARNINGS//g' \
              -e 's/ -G[^ ]*//g'
          sed -i '' \
            -e 's/GCC_WARN_INHIBIT_ALL_WARNINGS = YES/GCC_WARN_INHIBIT_ALL_WARNINGS = NO/g' \
            -e 's/-GCC_WARN_INHIBIT_ALL_WARNINGS//g' \
            "$CM_BUILD_DIR/ios/Pods/Pods.xcodeproj/project.pbxproj" 2>/dev/null || true

      - name: Xcode Archive
        script: |
          xcodebuild \
            -workspace ios/Runner.xcworkspace \
            -scheme Runner \
            -sdk iphoneos \
            -configuration Release \
            CLANG_ALLOW_NON_MODULAR_INCLUDES_IN_FRAMEWORK_MODULES=YES \
            archive \
            -archivePath "$CM_BUILD_DIR/build/ios/archive/Runner.xcarchive"

      - name: IPA exportieren
        script: |
          xcodebuild \
            -exportArchive \
            -archivePath "$CM_BUILD_DIR/build/ios/archive/Runner.xcarchive" \
            -exportPath "$CM_BUILD_DIR/build/ios/ipa" \
            -exportOptionsPlist "ios/ExportOptions.plist"

    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log

    publishing:
      app_store_connect:
        api_key: $APP_STORE_CONNECT_PRIVATE_KEY
        key_id: $APP_STORE_CONNECT_KEY_IDENTIFIER
        issuer_id: $APP_STORE_CONNECT_ISSUER_ID
        submit_to_testflight: true
