workflows:
  ios-release:
    name: iOS Release
    max_build_duration: 60
    environment:
      flutter: stable
      xcode: latest
      cocoapods: default
      groups:
        - firebase_ios
        - app_store_connect
        - ios_credentials
    scripts:
      - name: Flutter & Dart Version prüfen
        script: |
          flutter --version
          dart --version

      - name: Keychain initialisieren
        script: keychain initialize

      - name: Provisioning Profile installieren
        script: |
          PROFILES_HOME="$HOME/Library/MobileDevice/Provisioning Profiles"
          mkdir -p "$PROFILES_HOME"
          echo $CM_PROVISIONING_PROFILE | base64 --decode > "$PROFILES_HOME/eventride.mobileprovision"

      - name: Certificate importieren
        script: |
          echo $CM_CERTIFICATE | base64 --decode > /tmp/certificate.p12
          keychain add-certificates --certificate /tmp/certificate.p12 --certificate-password $CM_CERTIFICATE_PASSWORD

      - name: Code Signing konfigurieren
        script: xcode-project use-profiles

      - name: GoogleService-Info.plist einspielen
        script: |
          echo $GOOGLESERVICE_INFO_PLIST | base64 --decode \
            > $CM_BUILD_DIR/ios/Runner/GoogleService-Info.plist

      - name: Flutter packages + CocoaPods
        script: |
          flutter config --no-enable-swift-package-manager
          flutter pub get
          cd ios && pod install

      - name: Dart Analyse
        script: flutter analyze lib/

      - name: Fix GCC_WARN_INHIBIT_ALL_WARNINGS (BoringSSL-GRPC / Xcode 26)
        script: |
          find "$CM_BUILD_DIR/ios/Pods" -name "*.xcconfig" -print0 | \
            xargs -0 sed -i '' \
              -e 's/GCC_WARN_INHIBIT_ALL_WARNINGS = YES/GCC_WARN_INHIBIT_ALL_WARNINGS = NO/g' \
              -e 's/ -GCC_WARN_INHIBIT_ALL_WARNINGS//g' \
              -e 's/ -G[^ ]*//g'
          sed -i '' \
            -e 's/GCC_WARN_INHIBIT_ALL_WARNINGS = YES/GCC_WARN_INHIBIT_ALL_WARNINGS = NO/g' \
            -e 's/-GCC_WARN_INHIBIT_ALL_WARNINGS//g' \
            "$CM_BUILD_DIR/ios/Pods/Pods.xcodeproj/project.pbxproj" 2>/dev/null || true

      - name: Xcode Archive
        script: |
          xcodebuild \
            -workspace ios/Runner.xcworkspace \
            -scheme Runner \
            -sdk iphoneos \
            -configuration Release \
            archive \
            -archivePath "$CM_BUILD_DIR/build/ios/archive/Runner.xcarchive"

      - name: IPA exportieren
        script: |
          xcodebuild \
            -exportArchive \
            -archivePath "$CM_BUILD_DIR/build/ios/archive/Runner.xcarchive" \
            -exportPath "$CM_BUILD_DIR/build/ios/ipa" \
            -exportOptionsPlist "ios/ExportOptions.plist"

    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log

    publishing:
      app_store_connect:
        api_key: $APP_STORE_CONNECT_PRIVATE_KEY
        key_id: $APP_STORE_CONNECT_KEY_IDENTIFIER
        issuer_id: $APP_STORE_CONNECT_ISSUER_ID
        submit_to_testflight: true
