workflows:
  ios-release:
    name: iOS Release
    max_build_duration: 60
    environment:
      flutter: stable
      xcode: latest
      cocoapods: default
      groups:
        - firebase_ios
        - app_store_connect
        - ios_credentials
    scripts:
      - name: Keychain initialisieren
        script: keychain initialize

      - name: Provisioning Profile installieren
        script: |
          PROFILES_HOME="$HOME/Library/MobileDevice/Provisioning Profiles"
          mkdir -p "$PROFILES_HOME"
          echo $CM_PROVISIONING_PROFILE | base64 --decode > "$PROFILES_HOME/eventride.mobileprovision"

      - name: Certificate importieren
        script: |
          echo $CM_CERTIFICATE | base64 --decode > /tmp/certificate.p12
          keychain add-certificates --certificate /tmp/certificate.p12 --certificate-password $CM_CERTIFICATE_PASSWORD

      - name: Code Signing konfigurieren
        script: xcode-project use-profiles

      - name: GoogleService-Info.plist einspielen
        script: |
          echo $GOOGLESERVICE_INFO_PLIST | base64 --decode \
            > $CM_BUILD_DIR/ios/Runner/GoogleService-Info.plist

      - name: Flutter packages
        script: flutter pub get

      - name: CocoaPods
        script: find . -name "Podfile" -execdir pod install \;

      - name: Build IPA
        script: flutter build ipa --release --no-swift-package-manager

    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log

    publishing:
      app_store_connect:
        api_key: $APP_STORE_CONNECT_PRIVATE_KEY
        key_id: $APP_STORE_CONNECT_KEY_IDENTIFIER
        issuer_id: $APP_STORE_CONNECT_ISSUER_ID
        submit_to_testflight: true
