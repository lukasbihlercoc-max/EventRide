name: Build iOS IPA (unsigned)

on:
  workflow_dispatch:   # Der Workflow startet manuell
  push:
    branches:
      - main

jobs:
  build-ios:
    runs-on: macos-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Install Flutter dependencies
        run: flutter pub get

      - name: Enable iOS platform
        run: flutter config --enable-ios

      - name: Build iOS (debug unsigned)
        run: |
          flutter build ios --debug --no-codesign
          mkdir -p build/ipa
          cd build/ios/iphoneos
          # Packe das App-Bundle in eine IPA (unsigniert)
          zip -r ../../../ipa/app_unsigned.ipa Runner.app

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v3
        with:
          name: ios-ipa
          path: build/ipa/app_unsigned.ipa
