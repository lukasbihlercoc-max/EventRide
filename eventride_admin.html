<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EventRide Admin</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0d1117;
    --surface: #161b22;
    --surface2: #1c2333;
    --border: #30363d;
    --accent: #f5a623;
    --accent2: #2E6DA4;
    --text: #e6edf3;
    --muted: #7d8590;
    --success: #3fb950;
    --error: #f85149;
    --radius: 12px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
    padding: 0;
  }

  /* Background subtle grid */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(46,109,164,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(46,109,164,0.03) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
  }

  .app { position: relative; z-index: 1; max-width: 900px; margin: 0 auto; padding: 24px 16px 60px; }

  /* Header */
  header {
    display: flex;
    align-items: center;
    gap: 14px;
    margin-bottom: 32px;
    padding-bottom: 20px;
    border-bottom: 1px solid var(--border);
  }
  .logo {
    width: 42px; height: 42px;
    background: linear-gradient(135deg, var(--accent), #e8890d);
    border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    font-size: 20px;
    box-shadow: 0 4px 20px rgba(245,166,35,0.3);
  }
  header h1 {
    font-family: 'Syne', sans-serif;
    font-size: 22px;
    font-weight: 800;
    letter-spacing: -0.5px;
  }
  header h1 span { color: var(--accent); }
  .badge {
    margin-left: auto;
    background: rgba(63,185,80,0.12);
    color: var(--success);
    border: 1px solid rgba(63,185,80,0.25);
    border-radius: 20px;
    padding: 4px 12px;
    font-size: 12px;
    font-weight: 500;
  }

  /* Two column layout */
  .layout {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 20px;
  }
  @media (max-width: 640px) {
    .layout { grid-template-columns: 1fr; }
  }

  /* Cards */
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 20px;
  }
  .card-title {
    font-family: 'Syne', sans-serif;
    font-size: 13px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: var(--muted);
    margin-bottom: 14px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .card-title .dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--accent);
  }

  /* Input area */
  .input-panel { grid-column: 1 / -1; }

  textarea {
    width: 100%;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    padding: 12px;
    resize: vertical;
    min-height: 110px;
    transition: border-color 0.2s;
    outline: none;
  }
  textarea:focus { border-color: var(--accent2); }
  textarea::placeholder { color: var(--muted); }

  /* File upload */
  .upload-zone {
    border: 2px dashed var(--border);
    border-radius: 8px;
    padding: 20px;
    text-align: center;
    cursor: pointer;
    transition: all 0.2s;
    background: var(--surface2);
    margin-top: 10px;
    position: relative;
  }
  .upload-zone:hover, .upload-zone.dragover {
    border-color: var(--accent);
    background: rgba(245,166,35,0.05);
  }
  .upload-zone input[type=file] {
    position: absolute; inset: 0; opacity: 0; cursor: pointer;
  }
  .upload-zone .icon { font-size: 28px; margin-bottom: 6px; }
  .upload-zone p { color: var(--muted); font-size: 13px; }
  .upload-zone p strong { color: var(--accent); }

  #preview-img {
    max-width: 100%;
    max-height: 180px;
    border-radius: 8px;
    display: none;
    margin-top: 10px;
    object-fit: cover;
  }

  /* Analyze button */
  .btn-analyze {
    width: 100%;
    margin-top: 12px;
    padding: 13px;
    background: linear-gradient(135deg, var(--accent2), #1a4f7a);
    color: white;
    border: none;
    border-radius: 8px;
    font-family: 'Syne', sans-serif;
    font-size: 15px;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.2s;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
  }
  .btn-analyze:hover { transform: translateY(-1px); box-shadow: 0 6px 20px rgba(46,109,164,0.4); }
  .btn-analyze:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

  /* Form fields */
  .field { margin-bottom: 14px; }
  label {
    display: block;
    font-size: 12px;
    font-weight: 500;
    color: var(--muted);
    margin-bottom: 5px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }
  input[type=text], input[type=date], input[type=time], select {
    width: 100%;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    padding: 10px 12px;
    outline: none;
    transition: border-color 0.2s;
    -webkit-appearance: none;
  }
  input:focus, select:focus { border-color: var(--accent2); }
  select option { background: var(--surface2); }

  .field-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }

  /* AI loading */
  .ai-status {
    display: none;
    align-items: center;
    gap: 10px;
    padding: 12px;
    background: rgba(46,109,164,0.1);
    border: 1px solid rgba(46,109,164,0.3);
    border-radius: 8px;
    margin-top: 10px;
    font-size: 13px;
    color: var(--accent2);
  }
  .ai-status.visible { display: flex; }
  .spinner {
    width: 16px; height: 16px;
    border: 2px solid rgba(46,109,164,0.3);
    border-top-color: var(--accent2);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    flex-shrink: 0;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* Save button */
  .btn-save {
    width: 100%;
    padding: 15px;
    background: linear-gradient(135deg, var(--accent), #e8890d);
    color: #0d1117;
    border: none;
    border-radius: 8px;
    font-family: 'Syne', sans-serif;
    font-size: 16px;
    font-weight: 800;
    cursor: pointer;
    transition: all 0.2s;
    margin-top: 6px;
    letter-spacing: 0.3px;
  }
  .btn-save:hover { transform: translateY(-1px); box-shadow: 0 8px 25px rgba(245,166,35,0.4); }
  .btn-save:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

  /* Toast */
  .toast {
    position: fixed;
    bottom: 24px;
    left: 50%;
    transform: translateX(-50%) translateY(80px);
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 14px 20px;
    font-size: 14px;
    display: flex;
    align-items: center;
    gap: 10px;
    transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
    z-index: 100;
    white-space: nowrap;
    box-shadow: 0 8px 30px rgba(0,0,0,0.4);
  }
  .toast.show { transform: translateX(-50%) translateY(0); }
  .toast.success { border-color: rgba(63,185,80,0.4); }
  .toast.error { border-color: rgba(248,81,73,0.4); }

  /* Recent events list */
  .event-item {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 10px 0;
    border-bottom: 1px solid var(--border);
    font-size: 13px;
    animation: fadeIn 0.3s ease;
  }
  .event-item:last-child { border-bottom: none; }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(-6px); } to { opacity: 1; transform: none; } }
  .event-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--success); flex-shrink: 0; }
  .event-name { font-weight: 500; flex: 1; }
  .event-date { color: var(--muted); font-size: 12px; }

  .empty-state { color: var(--muted); font-size: 13px; text-align: center; padding: 20px 0; }

  /* Highlight effect when fields are filled by AI */
  .ai-filled {
    animation: highlight 1s ease forwards;
  }
  @keyframes highlight {
    0% { border-color: var(--accent); background: rgba(245,166,35,0.08); }
    100% { border-color: var(--border); background: var(--surface2); }
  }
</style>
</head>
<body>
<div class="app">

  <header>
    <div class="logo">🚗</div>
    <div>
      <h1>EventRide <span>Admin</span></h1>
      <div style="font-size:12px;color:var(--muted);margin-top:2px;">Kärnten · Event-Verwaltung</div>
    </div>
    <div class="badge" id="firebase-status">● Verbinde…</div>
  </header>

  <div class="layout">

    <!-- INPUT PANEL -->
    <div class="card input-panel">
      <div class="card-title"><span class="dot"></span>Event-Quelle</div>

      <label>Facebook / Instagram Post einfügen</label>
      <textarea id="post-text" placeholder="Post-Text hier einfügen… (z.B. aus Facebook kopieren)"></textarea>

      <div class="upload-zone" id="upload-zone">
        <input type="file" id="img-input" accept="image/*">
        <div class="icon">📸</div>
        <p><strong>Screenshot hochladen</strong> oder hierher ziehen</p>
        <p style="margin-top:4px;font-size:11px;">JPG, PNG – Flyer, Posts, Ankündigungen</p>
      </div>
      <img id="preview-img" alt="Vorschau">

      <div class="ai-status" id="ai-status">
        <div class="spinner"></div>
        <span id="ai-status-text">KI analysiert Event-Informationen…</span>
      </div>

      <button class="btn-analyze" id="btn-analyze" onclick="analyzeInput()">
        <span>✨</span> Mit KI analysieren
      </button>
    </div>

    <!-- FORM PANEL -->
    <div class="card">
      <div class="card-title"><span class="dot"></span>Event-Daten</div>

      <div class="field">
        <label>Eventname *</label>
        <input type="text" id="f-name" placeholder="z.B. Paternioner Kirchtag">
      </div>

      <div class="field field-row">
        <div>
          <label>Datum *</label>
          <input type="date" id="f-datum">
        </div>
        <div>
          <label>Uhrzeit</label>
          <input type="time" id="f-uhrzeit">
        </div>
      </div>

      <div class="field">
        <label>Standort / Gemeinde *</label>
        <input type="text" id="f-standort" placeholder="z.B. Paternion">
      </div>

      <div class="field">
        <label>Adresse / Ort</label>
        <input type="text" id="f-adresse" placeholder="z.B. Park neben Götzstadl">
      </div>

      <div class="field">
        <label>Bezirk</label>
        <select id="f-bezirk">
          <option value="">– Bezirk wählen –</option>
          <option>Feldkirchen</option>
          <option>Hermagor</option>
          <option>Klagenfurt-Land</option>
          <option>Klagenfurt-Stadt</option>
          <option>Sankt Veit</option>
          <option>Spittal</option>
          <option>Villach-Land</option>
          <option>Villach-Stadt</option>
          <option>Völkermarkt</option>
          <option>Wolfsberg</option>
        </select>
      </div>

      <div class="field">
        <label>Eintritt</label>
        <input type="text" id="f-eintritt" placeholder="z.B. 10€ / Frei">
      </div>

      <div class="field">
        <label>Beschreibung</label>
        <textarea id="f-beschreibung" style="min-height:70px;" placeholder="Kurze Beschreibung…"></textarea>
      </div>

      <button class="btn-save" id="btn-save" onclick="saveEvent()">
        ✓ In App speichern
      </button>
    </div>

    <!-- RECENT EVENTS -->
    <div class="card" style="grid-column: 1 / -1;">
      <div class="card-title"><span class="dot"></span>Zuletzt hinzugefügt</div>
      <div id="recent-list"><div class="empty-state">Noch keine Events in dieser Sitzung gespeichert.</div></div>
    </div>

  </div>
</div>

<div class="toast" id="toast"></div>

<!-- Firebase -->
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getFirestore, collection, addDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyBAq6FHDB3s_mWcE7ZSNifhSiOxUWrxQac",
    authDomain: "eventride-cd0e9.firebaseapp.com",
    projectId: "eventride-cd0e9",
    storageBucket: "eventride-cd0e9.firebasestorage.app",
    messagingSenderId: "686951435694",
    appId: "1:686951435694:web:b7ebb9bded06f1fa7e4c3f"
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);

  document.getElementById('firebase-status').textContent = '● Firebase OK';
  document.getElementById('firebase-status').style.background = 'rgba(63,185,80,0.12)';
  document.getElementById('firebase-status').style.color = '#3fb950';
  document.getElementById('firebase-status').style.borderColor = 'rgba(63,185,80,0.25)';

  window._db = db;
  window._collection = collection;
  window._addDoc = addDoc;
  window._serverTimestamp = serverTimestamp;
</script>

<script>
  // Image upload preview
  const imgInput = document.getElementById('img-input');
  const previewImg = document.getElementById('preview-img');
  const uploadZone = document.getElementById('upload-zone');

  imgInput.addEventListener('change', (e) => {
    const file = e.target.files[0];
    if (file) {
      const reader = new FileReader();
      reader.onload = (ev) => {
        previewImg.src = ev.target.result;
        previewImg.style.display = 'block';
        uploadZone.querySelector('p').textContent = '✓ ' + file.name;
      };
      reader.readAsDataURL(file);
    }
  });

  uploadZone.addEventListener('dragover', (e) => { e.preventDefault(); uploadZone.classList.add('dragover'); });
  uploadZone.addEventListener('dragleave', () => uploadZone.classList.remove('dragover'));
  uploadZone.addEventListener('drop', (e) => {
    e.preventDefault();
    uploadZone.classList.remove('dragover');
    const file = e.dataTransfer.files[0];
    if (file && file.type.startsWith('image/')) {
      imgInput.files = e.dataTransfer.files;
      imgInput.dispatchEvent(new Event('change'));
    }
  });

  // Analyze with Claude API
  async function analyzeInput() {
    const text = document.getElementById('post-text').value.trim();
    const imgSrc = previewImg.src;
    const hasImg = previewImg.style.display !== 'none' && imgSrc && imgSrc !== window.location.href;
    const hasText = text.length > 10;

    if (!hasText && !hasImg) {
      showToast('⚠️ Bitte Text einfügen oder Screenshot hochladen', 'error');
      return;
    }

    const btn = document.getElementById('btn-analyze');
    btn.disabled = true;
    const statusEl = document.getElementById('ai-status');
    statusEl.classList.add('visible');

    try {
      const messages = [];
      const contentParts = [];

      const prompt = `Du bist ein Assistent der Event-Informationen aus Social-Media-Posts oder Flyern für eine Mitfahrapp in Kärnten, Österreich extrahiert.

Extrahiere alle verfügbaren Informationen und antworte NUR mit einem JSON-Objekt (kein Markdown, keine Erklärung):
{
  "name": "Vollständiger Eventname",
  "datum": "YYYY-MM-DD oder leer wenn unklar",
  "uhrzeit": "HH:MM oder leer",
  "standort": "Gemeinde/Ort",
  "adresse": "Genaue Adresse/Veranstaltungsort",
  "bezirk": "Einer von: Feldkirchen, Hermagor, Klagenfurt-Land, Klagenfurt-Stadt, Sankt Veit, Spittal, Villach-Land, Villach-Stadt, Völkermarkt, Wolfsberg – oder leer",
  "eintritt": "Eintritt als Text oder leer",
  "beschreibung": "Kurze Beschreibung max 1 Satz"
}`;

      if (hasImg) {
        const base64 = imgSrc.split(',')[1];
        const mimeMatch = imgSrc.match(/data:([^;]+);/);
        const mimeType = mimeMatch ? mimeMatch[1] : 'image/jpeg';
        contentParts.push({ type: "image", source: { type: "base64", media_type: mimeType, data: base64 } });
      }
      if (hasText) {
        contentParts.push({ type: "text", text: `Post-Text:\n${text}` });
      }
      contentParts.push({ type: "text", text: prompt });

      messages.push({ role: "user", content: contentParts });

      const response = await fetch("https://api.anthropic.com/v1/messages", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          model: "claude-sonnet-4-20250514",
          max_tokens: 1000,
          messages
        })
      });

      const data = await response.json();
      const raw = data.content.map(b => b.text || '').join('');
      const clean = raw.replace(/```json|```/g, '').trim();
      const result = JSON.parse(clean);

      // Fill form fields with animation
      fillField('f-name', result.name);
      fillField('f-standort', result.standort);
      fillField('f-adresse', result.adresse);
      fillField('f-eintritt', result.eintritt);
      fillField('f-beschreibung', result.beschreibung);
      if (result.datum) fillField('f-datum', result.datum);
      if (result.uhrzeit) fillField('f-uhrzeit', result.uhrzeit);
      if (result.bezirk) {
        const sel = document.getElementById('f-bezirk');
        sel.value = result.bezirk;
        highlightField(sel);
      }

      showToast('✨ Event erfolgreich analysiert!', 'success');
    } catch (err) {
      console.error(err);
      showToast('❌ Fehler bei der Analyse: ' + err.message, 'error');
    } finally {
      btn.disabled = false;
      statusEl.classList.remove('visible');
    }
  }

  function fillField(id, value) {
    if (!value) return;
    const el = document.getElementById(id);
    el.value = value;
    highlightField(el);
  }

  function highlightField(el) {
    el.classList.remove('ai-filled');
    void el.offsetWidth;
    el.classList.add('ai-filled');
  }

  // Save to Firebase
  async function saveEvent() {
    const name = document.getElementById('f-name').value.trim();
    const datum = document.getElementById('f-datum').value;
    const standort = document.getElementById('f-standort').value.trim();

    if (!name || !standort) {
      showToast('⚠️ Eventname und Standort sind Pflichtfelder', 'error');
      return;
    }

    if (!window._db) {
      showToast('❌ Firebase nicht verbunden', 'error');
      return;
    }

    const btn = document.getElementById('btn-save');
    btn.disabled = true;
    btn.textContent = '⏳ Speichert…';

    try {
      const uhrzeit = document.getElementById('f-uhrzeit').value;
      const datumString = datum
        ? (uhrzeit ? `${datum}T${uhrzeit}:00.000Z` : `${datum}T23:00:00.000Z`)
        : '';

      const eventData = {
        name,
        datum: datumString,
        standort,
        adresse: document.getElementById('f-adresse').value.trim(),
        bezirk: document.getElementById('f-bezirk').value,
        beschreibung: document.getElementById('f-beschreibung').value.trim(),
        eintritt: document.getElementById('f-eintritt').value.trim(),
        typ: 'admin',
        id: Date.now().toString(),
        createdAt: window._serverTimestamp()
      };

      await window._addDoc(window._collection(window._db, 'events'), eventData);

      // Add to recent list
      addToRecentList(name, datum, standort);
      showToast('✅ Event gespeichert: ' + name, 'success');
      clearForm();
    } catch (err) {
      showToast('❌ Fehler: ' + err.message, 'error');
    } finally {
      btn.disabled = false;
      btn.textContent = '✓ In App speichern';
    }
  }

  function addToRecentList(name, datum, standort) {
    const list = document.getElementById('recent-list');
    const empty = list.querySelector('.empty-state');
    if (empty) empty.remove();

    const item = document.createElement('div');
    item.className = 'event-item';
    const dateStr = datum ? new Date(datum).toLocaleDateString('de-AT', {day:'2-digit', month:'2-digit', year:'numeric'}) : '–';
    item.innerHTML = `<div class="event-dot"></div><div class="event-name">${name}</div><div class="event-date">${dateStr} · ${standort}</div>`;
    list.insertBefore(item, list.firstChild);
  }

  function clearForm() {
    ['f-name','f-datum','f-uhrzeit','f-standort','f-adresse','f-eintritt','f-beschreibung'].forEach(id => {
      document.getElementById(id).value = '';
    });
    document.getElementById('f-bezirk').value = '';
    document.getElementById('post-text').value = '';
    previewImg.style.display = 'none';
    previewImg.src = '';
    imgInput.value = '';
    uploadZone.querySelector('p').innerHTML = '<strong>Screenshot hochladen</strong> oder hierher ziehen';
  }

  function showToast(msg, type) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.className = `toast ${type} show`;
    setTimeout(() => t.classList.remove('show'), 3500);
  }

  window.analyzeInput = analyzeInput;
  window.saveEvent = saveEvent;
</script>
</body>
</html>
